import React,{useState,useEffect,useRef,useMemo} from 'react';

const SUPABASE_URL='https://gffhlahrjwiojdewvxws.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZmhsYWhyandpb2pkZXd2eHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NDA2ODYsImV4cCI6MjA4MjUxNjY4Nn0.yUdUDPYU63-70l-a2b3fqxDfb_GkX6hUveHRwaYcadc';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const Role={ADMIN:'admin',ODONTOLOGO:'odontologo',USUARIO:'usuario'};

// ===== TOASTS =====
const tLabels={users:'usuarios',patients:'pacientes',appointments:'citas',history:'historial',images:'imágenes',medical_records:'ficha médica'};
const toastListeners=new Set();let toastId=0;
const toast={
    _emit:(type,msg,ms)=>{const id=++toastId;const item={id,type,msg,ms:ms||(type==='err'?5000:3500)};toastListeners.forEach(l=>l(item));return id},
    err:(msg,ms)=>toast._emit('err',msg,ms),
    ok:(msg,ms)=>toast._emit('ok',msg,ms),
    warn:(msg,ms)=>toast._emit('warn',msg,ms)
};
const dbErr=(op,t,e)=>{console.error(op,t,e);const detail=e?.message||e?.hint||'sin conexión';toast.err(`Error al ${op} ${tLabels[t]||t}: ${detail}`)};

// ===== THEME =====
const useTheme=()=>{
    const[dark,setDark]=useState(()=>document.documentElement.classList.contains('dark'));
    const toggle=()=>{const next=!dark;setDark(next);document.documentElement.classList.toggle('dark',next);try{localStorage.setItem('artedental_theme',next?'dark':'light')}catch(e){}};
    return[dark,toggle];
};

// ===== DB layer =====
const DB={
    online:false,
    check:async()=>{try{const{error}=await supabase.from('users').select('id').limit(1);DB.online=!error;return DB.online}catch{DB.online=false;return false}},
    getAll:async(t,opts={})=>{try{let q=supabase.from(t).select('*');if(opts.notDeleted)q=q.or('deleted.is.null,deleted.eq.false');if(opts.eq)for(const[k,v]of Object.entries(opts.eq))q=q.eq(k,v);q=opts.orderBy?q.order(opts.orderBy,{ascending:opts.asc!==false}):q.order('id');const{data,error}=await q;if(error)throw error;return data||[]}catch(e){dbErr('cargar',t,e);return[]}},
    insert:async(t,r)=>{try{const{data,error}=await supabase.from(t).insert(r).select().single();if(error)throw error;return data}catch(e){dbErr('guardar',t,e);return null}},
    update:async(t,id,r)=>{try{const{data,error}=await supabase.from(t).update(r).eq('id',id).select().single();if(error)throw error;return data}catch(e){dbErr('actualizar',t,e);return null}},
    delete:async(t,id)=>{try{const{error}=await supabase.from(t).delete().eq('id',id);if(error)throw error;return true}catch(e){dbErr('eliminar',t,e);return false}}
};

// ===== Service layer =====
const S={
    init:async()=>await DB.check(),
    getCurrentUser:async()=>{
        const{data:{session}}=await supabase.auth.getSession();
        if(!session)return null;
        const{data,error}=await supabase.from('users').select('*').eq('email',session.user.email).maybeSingle();
        if(error||!data)return null;
        return data;
    },
    getUsers:()=>DB.getAll('users',{orderBy:'id'}),
    updateUserMeta:async u=>DB.update('users',u.id,{name:u.name,username:(u.username||'').toLowerCase(),role:u.role}),
    createUser:async({email,password,name,username,role})=>{
        email=(email||'').trim().toLowerCase();
        username=(username||'').trim().toLowerCase();
        if(!email||!password||!name||!username)return{ok:false,err:'Faltan campos'};
        if(password.length<6)return{ok:false,err:'Contraseña mínima 6 caracteres'};
        try{
            const{data:sess}=await supabase.auth.getSession();
            const adminSession=sess?.session;
            const{data,error}=await supabase.auth.signUp({email,password});
            if(error)throw error;
            if(adminSession){await supabase.auth.setSession({access_token:adminSession.access_token,refresh_token:adminSession.refresh_token})}
            const row=await DB.insert('users',{email,username,name,role,auth_id:data.user?.id});
            if(!row)return{ok:false,err:'Usuario creado en Auth pero falló el guardado de metadatos'};
            return{ok:true,user:row};
        }catch(e){return{ok:false,err:e.message||'Error al crear usuario'}}
    },
    delUser:id=>DB.delete('users',id),
    changeOwnPassword:async np=>{
        if(np.length<6)return{ok:false,err:'Mínimo 6 caracteres'};
        const{error}=await supabase.auth.updateUser({password:np});
        if(error)return{ok:false,err:error.message};
        return{ok:true};
    },
    getPatients:()=>DB.getAll('patients',{notDeleted:true}),
    getPatient:async id=>{const{data}=await supabase.from('patients').select('*').eq('id',id).maybeSingle();return data},
    savePatient:async p=>p.id?DB.update('patients',p.id,p):DB.insert('patients',p),
    delPatient:id=>DB.update('patients',id,{deleted:true}),
    getApps:()=>DB.getAll('appointments',{notDeleted:true}),
    getAppsByPatient:pid=>DB.getAll('appointments',{notDeleted:true,eq:{paciente_id:pid}}),
    saveApp:async a=>a.id?DB.update('appointments',a.id,a):DB.insert('appointments',a),
    delApp:id=>DB.update('appointments',id,{deleted:true}),
    getHist:async pid=>DB.getAll('history',{notDeleted:true,eq:{paciente_id:pid},orderBy:'id',asc:false}),
    saveHist:h=>DB.insert('history',h),
    getImgs:async pid=>DB.getAll('images',{notDeleted:true,eq:{paciente_id:pid}}),
    saveImg:i=>DB.insert('images',i),
    delImg:id=>DB.update('images',id,{deleted:true}),
    getMed:async pid=>{const{data}=await supabase.from('medical_records').select('*').eq('paciente_id',pid).maybeSingle();return data},
    saveMed:async r=>{const ex=await S.getMed(r.paciente_id);return ex?DB.update('medical_records',ex.id,r):DB.insert('medical_records',r)},
    hasCond:async pid=>{const r=await S.getMed(pid);if(!r)return false;return(r.alergias?.length>0)||(r.alergias_medicamentos?.length>0)||(r.medicacion_actual?.length>0)||Object.entries(r.antecedentes_personales||{}).some(([k,v])=>k!=='otros'&&v===true)},
    export:async()=>JSON.stringify({patients:await DB.getAll('patients'),appointments:await DB.getAll('appointments'),history:await DB.getAll('history'),images:await DB.getAll('images'),medical_records:await DB.getAll('medical_records')},null,2),
    import:async json=>{
        try{
            const d=JSON.parse(json);
            const allowed=['patients','appointments','history','images','medical_records'];
            const keys=Object.keys(d);
            if(keys.some(k=>!allowed.includes(k))){toast.err('Backup inválido: contiene tablas no permitidas');return false}
            for(const t of keys)for(const r of d[t])await supabase.from(t).upsert(r);
            return true;
        }catch{return false}
    },
    getTemplates:()=>DB.getAll('consent_templates',{eq:{activo:true},orderBy:'orden'}),
    getAllTemplates:()=>DB.getAll('consent_templates',{orderBy:'orden'}),
    saveTemplate:async t=>t.id?DB.update('consent_templates',t.id,{titulo:t.titulo,contenido:t.contenido,activo:t.activo,orden:t.orden,updated_at:new Date().toISOString()}):DB.insert('consent_templates',{titulo:t.titulo,contenido:t.contenido,activo:t.activo!==false,orden:t.orden||0}),
    delTemplate:id=>DB.delete('consent_templates',id),
    getConsentRecords:pid=>DB.getAll('consent_records',{notDeleted:true,eq:{paciente_id:pid},orderBy:'id',asc:false}),
    saveConsentRecord:r=>DB.insert('consent_records',r),
    updateConsentRecord:(id,r)=>DB.update('consent_records',id,r),
    delConsentRecord:id=>DB.update('consent_records',id,{deleted:true}),
    // Tratamientos (lista plana, reemplaza a presupuestos+items)
    getTreatments:pid=>DB.getAll('treatments',{notDeleted:true,eq:{paciente_id:pid},orderBy:'created_at',asc:false}),
    addTreatment:t=>DB.insert('treatments',t),
    updateTreatment:(id,t)=>DB.update('treatments',id,{...t,updated_at:new Date().toISOString()}),
    delTreatment:id=>DB.update('treatments',id,{deleted:true}),
    // Comentarios por tratamiento
    getTreatmentComments:tid=>DB.getAll('treatment_comments',{eq:{treatment_id:tid},orderBy:'created_at',asc:true}),
    addTreatmentComment:c=>DB.insert('treatment_comments',c),
    delTreatmentComment:id=>DB.delete('treatment_comments',id),
    // Configuración de clínica (singleton id=1)
    getClinicConfig:async()=>{const r=await DB.getAll('clinic_config',{eq:{id:1}});return r[0]||null},
    saveClinicConfig:async cfg=>{
        const exists=await DB.getAll('clinic_config',{eq:{id:1}});
        const data={...cfg,id:1,updated_at:new Date().toISOString()};
        if(exists.length){return DB.update('clinic_config',1,data)}
        return DB.insert('clinic_config',data);
    },
    // Mantener legacy de budgets por compatibilidad pero ya no se usan en UI nueva
    getBudgets:pid=>DB.getAll('budgets',{notDeleted:true,eq:{paciente_id:pid},orderBy:'id',asc:false}),
    getBudgetItems:bid=>DB.getAll('budget_items',{eq:{budget_id:bid},orderBy:'orden'})
};

const isPast=(d,t)=>d&&t?new Date(d+'T'+t)<new Date():false;
const compress=file=>new Promise(res=>{const r=new FileReader();r.readAsDataURL(file);r.onload=e=>{const img=new Image();img.src=e.target.result;img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;const M=800;if(w>h&&w>M){h*=M/w;w=M}else if(h>M){w*=M/h;h=M}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.6))}}});
const formatCI=ci=>{if(!ci)return '';const nums=String(ci).replace(/\D/g,'');if(nums.length<=1)return nums;if(nums.length<=4)return nums.replace(/(\d{1})(\d{1,3})/,'$1.$2');if(nums.length<=7)return nums.replace(/(\d{1})(\d{3})(\d{1,3})/,'$1.$2.$3');return nums.replace(/(\d{1})(\d{3})(\d{3})(\d{1})/,'$1.$2.$3-$4').substring(0,12)};
const calcEdad=fn=>{if(!fn)return null;const b=new Date(fn);if(isNaN(b))return null;const t=new Date();let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a};
const MESES_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ===== UI ATOMS =====
const Status=({on})=><div className={`flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-bold ${on?'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300':'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300'}`}>{on?<><Wifi size={12}/>Online</>:<><WifiOff size={12}/>Offline</>}</div>;
const Portal=({children})=>createPortal(children,document.body);
const Modal=({src,onClose})=><Portal><div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4" onClick={onClose}><img src={src} className="max-w-full max-h-full rounded-lg"/></div></Portal>;
const Card=({children,className='',...rest})=><div {...rest} className={`bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl ${className}`}>{children}</div>;
const SectionTitle=({icon:Icon,children,color='text-brand-600 dark:text-brand-400'})=><h3 className={`font-bold text-xs uppercase mb-3 flex items-center gap-2 ${color}`}>{Icon&&<Icon size={14}/>}{children}</h3>;
const Input=props=><input {...props} className={`w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-medium bg-white dark:bg-slate-700 ${props.className||''}`}/>;
const Select=({children,...props})=><select {...props} className={`w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-sm font-medium bg-white dark:bg-slate-700 ${props.className||''}`}>{children}</select>;
const Textarea=props=><textarea {...props} className={`w-full p-2.5 border border-slate-300 dark:border-slate-600 rounded-lg text-sm bg-white dark:bg-slate-700 ${props.className||''}`}/>;
const Btn=({children,variant='primary',className='',...props})=>{const v={primary:'bg-brand-600 hover:bg-brand-700 text-white',secondary:'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-300 dark:hover:bg-slate-600',danger:'bg-red-600 hover:bg-red-700 text-white',success:'bg-emerald-600 hover:bg-emerald-700 text-white',ghost:'bg-transparent hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300'}[variant];return<button {...props} className={`${v} font-bold rounded-xl transition-colors disabled:opacity-50 ${className}`}>{children}</button>};

const Toasts=()=>{
    const[items,setItems]=useState([]);
    useEffect(()=>{const l=t=>{setItems(x=>[...x,t]);setTimeout(()=>setItems(x=>x.filter(i=>i.id!==t.id)),t.ms)};toastListeners.add(l);return()=>toastListeners.delete(l)},[]);
    const close=id=>setItems(x=>x.filter(i=>i.id!==id));
    const cfg={err:{bg:'bg-red-600',Icon:XCircle},ok:{bg:'bg-emerald-600',Icon:CheckCircle2},warn:{bg:'bg-amber-500',Icon:AlertTriangle}};
    return<div className="fixed top-3 right-3 left-3 sm:left-auto z-[100] space-y-2 pointer-events-none safe-top sm:max-w-sm">
        {items.map(t=>{const{bg,Icon}=cfg[t.type];return<div key={t.id} className={`${bg} text-white px-3 py-2.5 rounded-xl shadow-lg flex items-center gap-2 text-sm font-medium pointer-events-auto animate-fade-in`}><Icon size={18} className="shrink-0"/><span className="flex-1 break-words">{t.msg}</span><button onClick={()=>close(t.id)} className="text-white/80 hover:text-white shrink-0"><X size={14}/></button></div>})}
    </div>
};

// ===== LOGIN =====
const Login=({onLogin,online})=>{
    const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
    const submit=async e=>{
        e.preventDefault();
        if(!u||!p)return setErr('Complete todos los campos');
        setLoading(true);setErr('');
        const username=u.trim().toLowerCase();
        const email=username.includes('@')?username:`${username}@local.com`;
        try{
            const{error}=await supabase.auth.signInWithPassword({email,password:p});
            if(error)throw error;
            const user=await S.getCurrentUser();
            if(!user){await supabase.auth.signOut();setErr('Usuario autenticado pero sin perfil');return}
            onLogin(user);
        }catch(e){setErr('Credenciales incorrectas')}
        finally{setLoading(false)}
    };
    return<div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-800 to-indigo-900 p-4 safe-top safe-bottom"><div className="w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 text-center"><Cloud size={40} className="mx-auto text-brand-600 dark:text-brand-400 mb-2"/><h1 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-1">🦷 Arte Dental</h1><p className="text-[10px] text-slate-400 mb-2">Sistema en la Nube</p><div className="mb-4 flex justify-center"><Status on={online}/></div><form onSubmit={submit} className="space-y-3"><Input type="text" value={u} onChange={e=>setU(e.target.value)} placeholder="Usuario" autoComplete="username" autoCapitalize="none" spellCheck="false"/><Input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Contraseña" autoComplete="current-password"/>{err&&<p className="text-red-500 text-xs font-medium">{err}</p>}<Btn type="submit" disabled={loading||!online} className="w-full py-3">{loading?'Conectando...':online?'Ingresar':'Sin conexión'}</Btn></form></div></div>
};

// ===== DASHBOARD =====
const Dashboard=({user,onOpenPatient})=>{
    const[stats,setStats]=useState(null);const[upcoming,setUpcoming]=useState([]);
    useEffect(()=>{(async()=>{
        const[pts,apps,hist]=await Promise.all([S.getPatients(),S.getApps(),DB.getAll('history',{notDeleted:true})]);
        const today=new Date().toISOString().split('T')[0];
        const past=apps.filter(a=>isPast(a.fecha,a.hora));
        const pastDecidido=past.filter(a=>a.asistio===true||a.asistio===false);
        const asistidas=past.filter(a=>a.asistio===true).length;
        const cobrado=hist.filter(h=>h.tipo==='PAGO').reduce((s,h)=>{const m=/\$(\d+)/.exec(h.motivo||'');return s+(m?parseInt(m[1]):0)},0);
        setStats({
            totalPacientes:pts.length,
            citasHoy:apps.filter(a=>a.fecha===today&&!isPast(a.fecha,a.hora)).length,
            citasProximas:apps.filter(a=>!isPast(a.fecha,a.hora)).length,
            asistenciaPct:pastDecidido.length?Math.round((asistidas/pastDecidido.length)*100):null,
            saldoPendiente:pts.reduce((s,p)=>s+Math.max(0,(p.presupuesto||0)-(p.abonado||0)),0),
            cobrado
        });
        setUpcoming(apps.filter(a=>!isPast(a.fecha,a.hora)).sort((a,b)=>new Date(a.fecha+'T'+a.hora)-new Date(b.fecha+'T'+b.hora)).slice(0,5));
    })()},[]);

    if(!stats)return<div className="p-8 text-center text-slate-400"><RefreshCw className="animate-spin mx-auto mb-2" size={24}/>Cargando...</div>;
    const StatCard=({label,value,icon:Icon,color,sub})=><Card className="p-4"><div className="flex justify-between items-start"><div><p className="text-[10px] font-bold text-slate-400 uppercase">{label}</p><p className={`text-2xl font-bold ${color}`}>{value}</p>{sub&&<p className="text-[10px] text-slate-400">{sub}</p>}</div><Icon size={20} className={color}/></div></Card>;

    return<div className="space-y-4 animate-fade-in">
        <div className="bg-gradient-to-br from-slate-800 to-indigo-900 p-4 rounded-xl text-white"><h2 className="text-lg font-bold">Hola, {user.name} 👋</h2><p className="text-[11px] text-white/70">{new Date().toLocaleDateString('es-UY',{weekday:'long',day:'numeric',month:'long'})}</p></div>

// ===== AGENDA (slots por día + calendario mensual) =====
const SLOTS=(()=>{const r=[];for(let h=7;h<21;h++){r.push(`${String(h).padStart(2,'0')}:00`);r.push(`${String(h).padStart(2,'0')}:30`)}r.push('21:00');return r})();
const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ymd=d=>d.toISOString().split('T')[0];
const parseYMD=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};

// Modal para agendar / ver / editar cita en un slot
const SlotModal=({slot,apps,pts,users,cond,user,onClose,onSaved})=>{
    const existing=slot.apps||[];
    const[mode,setMode]=useState(existing.length===0?'new':'list');
    const[form,setForm]=useState({pid:'',dr:slot.dr||'',tto:''});
    const[search,setSearch]=useState('');const[showList,setShowList]=useState(false);
    const[saving,setSaving]=useState(false);

    const submit=async()=>{
        if(!form.pid||!form.dr)return toast.warn('Complete paciente y odontólogo');
        if(new Date(slot.date+'T'+slot.time)<new Date())return toast.warn('La fecha/hora ya pasó');
        if(apps.find(a=>a.odontologo===form.dr&&a.fecha===slot.date&&a.hora===slot.time))return toast.warn('Ese odontólogo ya tiene cita a esa hora');
        const p=pts.find(x=>x.id===form.pid);
        if(!p)return toast.warn('Seleccione paciente');
        setSaving(true);
        const result=await S.saveApp({paciente_id:p.id,paciente_nombre:p.nombre,paciente_ci:p.ci,odontologo:form.dr,fecha:slot.date,hora:slot.time,tratamiento:form.tto||'',asistio:null,deleted:false});
        if(result){
            await S.saveHist({paciente_id:p.id,fecha:new Date().toLocaleDateString(),odontologo:form.dr,motivo:'CITA AGENDADA: '+slot.date+' '+slot.time,tipo:'CITA',deleted:false});
            toast.ok('Cita agendada');onSaved();onClose();
        }
        setSaving(false);
    };

    const toggle=async(id,val)=>{const a=apps.find(x=>x.id===id);if(a){await S.saveApp({...a,asistio:val});onSaved()}};
    const del=async(id)=>{if(confirm('¿Eliminar cita?')){await S.delApp(id);onSaved();onClose()}};

    return<Portal><div className="fixed inset-0 bg-black/60 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
        <div className="bg-white dark:bg-slate-800 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 max-h-[90vh] overflow-auto animate-slide-in" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center mb-3">
                <div><h3 className="font-bold text-lg">{slot.time}</h3><p className="text-xs text-slate-500 dark:text-slate-400">{parseYMD(slot.date).toLocaleDateString('es-UY',{weekday:'long',day:'numeric',month:'long'})}</p></div>
                <button onClick={onClose}><X size={20} className="text-slate-400"/></button>
            </div>

            {mode==='list'&&<div className="space-y-2">
                {existing.map(a=><div key={a.id} className={`p-3 rounded-lg border ${cond[a.paciente_id]?'border-pink-300 bg-pink-50 dark:bg-pink-900/10':'border-slate-200 dark:border-slate-700'}`}>
                    <div className="flex justify-between items-start gap-2 mb-2">
                        <div className="min-w-0 flex-1"><p className="font-bold text-sm truncate">{a.paciente_nombre}{cond[a.paciente_id]&&<HeartPulse size={14} className="text-pink-500 inline ml-1"/>}</p><p className="text-xs text-slate-500 dark:text-slate-400">Dr. {a.odontologo}</p>{a.tratamiento&&<p className="text-xs mt-1 text-slate-600 dark:text-slate-300">{a.tratamiento}</p>}</div>
                    </div>
                    <div className="flex gap-1">
                        <button onClick={()=>toggle(a.id,true)} className={`flex-1 p-2 rounded text-xs font-bold ${a.asistio===true?'bg-emerald-600 text-white':'bg-slate-100 dark:bg-slate-700 text-slate-500'}`}><UserCheck size={14} className="inline mr-1"/>Asistió</button>
                        <button onClick={()=>toggle(a.id,false)} className={`flex-1 p-2 rounded text-xs font-bold ${a.asistio===false?'bg-red-600 text-white':'bg-slate-100 dark:bg-slate-700 text-slate-500'}`}><UserX size={14} className="inline mr-1"/>No asistió</button>
                        <button onClick={()=>del(a.id)} className="p-2 rounded bg-red-50 dark:bg-red-900/30 text-red-500"><Trash2 size={14}/></button>
                    </div>
                </div>)}
                <Btn onClick={()=>setMode('new')} variant="secondary" className="w-full py-2.5 text-sm"><PlusCircle size={14} className="inline mr-1"/>Agregar otra cita en este horario</Btn>

                    <Input type="text" placeholder="Buscar paciente..." value={search} onChange={e=>{setSearch(e.target.value);setShowList(true)}} autoFocus/>

                </div>

                <Textarea value={form.tto} onChange={e=>setForm({...form,tto:e.target.value})} placeholder="Descripción (opcional)..." className="h-16 resize-none"/>
                <div className="flex gap-2">
                    <Btn onClick={submit} disabled={saving} className="flex-1 py-3 text-sm">{saving?'Guardando...':'Confirmar'}</Btn>

                </div>
            </div>}
        </div>
    </div></Portal>

// Vista de día con slots
const DayView=({date,setDate,apps,pts,users,cond,user,drFilter,onReload})=>{
    const[slot,setSlot]=useState(null);
    const today=ymd(new Date());
    const dayApps=apps.filter(a=>a.fecha===date&&(!drFilter||a.odontologo===drFilter));
    const byTime=useMemo(()=>{const m={};for(const a of dayApps){if(!m[a.hora])m[a.hora]=[];m[a.hora].push(a)}return m},[dayApps]);
    const now=new Date();
    const isToday=date===today;

    return<div className="space-y-3">
        <Card className="p-3">
            <div className="flex items-center gap-2">
                <Btn variant="secondary" onClick={()=>setDate(ymd(addDays(parseYMD(date),-1)))} className="p-2"><ChevronLeft size={16}/></Btn>
                <div className="flex-1 text-center min-w-0">
                    <p className="font-bold text-sm capitalize">{parseYMD(date).toLocaleDateString('es-UY',{weekday:'long'})}</p>
                    <p className="text-xs text-slate-500 dark:text-slate-400">{parseYMD(date).toLocaleDateString('es-UY',{day:'numeric',month:'long',year:'numeric'})}</p>
                </div>
                <Btn variant="secondary" onClick={()=>setDate(ymd(addDays(parseYMD(date),1)))} className="p-2"><ChevronLeft size={16} className="rotate-180"/></Btn>
            </div>
            <div className="flex gap-2 mt-3">
                <Input type="date" value={date} onChange={e=>setDate(e.target.value)} className="flex-1 py-2"/>
                {!isToday&&<Btn onClick={()=>setDate(today)} variant="secondary" className="px-4 py-2 text-xs">Hoy</Btn>}
            </div>
        </Card>

        <Card className="overflow-hidden">
            <div className="divide-y divide-slate-200 dark:divide-slate-700">
                {SLOTS.map(time=>{
                    const slotApps=byTime[time]||[];
                    const slotDate=new Date(date+'T'+time);
                    const past=slotDate<now;
                    const occupied=slotApps.length>0;
                    return<button key={time} onClick={()=>{if(past&&!occupied)return toast.warn('Esa hora ya pasó');setSlot({date,time,dr:drFilter,apps:slotApps})}} className={`w-full flex items-stretch text-left hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors ${past?'opacity-60':''} ${past&&!occupied?'cursor-not-allowed':''}`}>
                        <div className={`w-14 shrink-0 flex items-center justify-center text-xs font-bold border-r border-slate-200 dark:border-slate-700 ${occupied?'bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300':'bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400'}`}>{time}</div>
                        <div className="flex-1 p-2 min-h-[3rem]">
                            {slotApps.length===0?<span className="text-[10px] text-slate-300 dark:text-slate-600 italic">{past?'Hora pasada':'Libre — tap para agendar'}</span>
                            :<div className="space-y-1">{slotApps.map(a=><div key={a.id} className={`px-2 py-1 rounded text-xs flex items-center justify-between gap-2 ${a.asistio===true?'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300':a.asistio===false?'bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-300':cond[a.paciente_id]?'bg-pink-100 dark:bg-pink-900/30 text-pink-800 dark:text-pink-300':'bg-brand-100 dark:bg-brand-900/40 text-brand-800 dark:text-brand-200'}`}>
                                <div className="min-w-0 flex-1"><p className="font-bold truncate">{a.paciente_nombre}{cond[a.paciente_id]&&<HeartPulse size={10} className="text-pink-500 inline ml-1"/>}</p><p className="text-[9px] opacity-80 truncate">Dr. {a.odontologo}</p></div>
                                {a.asistio===true&&<UserCheck size={12} className="shrink-0"/>}
                                {a.asistio===false&&<UserX size={12} className="shrink-0"/>}
                            </div>)}</div>}
                        </div>
                    </button>
                })}
            </div>
        </Card>

        {slot&&<SlotModal slot={slot} apps={apps} pts={pts} users={users} cond={cond} user={user} onClose={()=>setSlot(null)} onSaved={onReload}/>}
    </div>
};

// Vista mensual
const MonthView=({apps,onPickDay})=>{
    const[cursor,setCursor]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)});
    const year=cursor.getFullYear(),month=cursor.getMonth();
    const today=ymd(new Date());
    const firstDay=new Date(year,month,1).getDay(); // 0=Dom
    const daysInMonth=new Date(year,month+1,0).getDate();
    // Construir grilla: 6 semanas x 7 días
    const cells=[];
    for(let i=0;i<firstDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(new Date(year,month,d));
    while(cells.length<42)cells.push(null);

    const countByDate=useMemo(()=>{const m={};for(const a of apps){m[a.fecha]=(m[a.fecha]||0)+1}return m},[apps]);
    const prev=()=>setCursor(new Date(year,month-1,1));
    const next=()=>setCursor(new Date(year,month+1,1));
    const goToday=()=>setCursor(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)});

    return<div className="space-y-3">
        <Card className="p-3">
            <div className="flex items-center gap-2">
                <Btn variant="secondary" onClick={prev} className="p-2"><ChevronLeft size={16}/></Btn>
                <div className="flex-1 text-center">
                    <p className="font-bold text-sm capitalize">{MONTHS[month]} {year}</p>
                </div>
                <Btn variant="secondary" onClick={next} className="p-2"><ChevronLeft size={16} className="rotate-180"/></Btn>
                <Btn variant="secondary" onClick={goToday} className="px-3 py-2 text-xs">Hoy</Btn>
            </div>
        </Card>
        <Card className="p-2">
            <div className="grid grid-cols-7 gap-1 mb-1">
                {DOW.map(d=><div key={d} className="text-center text-[10px] font-bold text-slate-400 py-1">{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1">
                {cells.map((d,i)=>{
                    if(!d)return<div key={i}/>;
                    const ds=ymd(d);
                    const count=countByDate[ds]||0;
                    const isToday=ds===today;
                    const dow=d.getDay();
                    const clickable=dow>=1&&dow<=6; // L-S
                    const isSunday=dow===0;
                    return<button key={i} disabled={!clickable} onClick={()=>clickable&&onPickDay(ds)} className={`aspect-square rounded-lg flex flex-col items-center justify-center relative text-xs font-bold transition-colors
                        ${isToday?'bg-brand-600 text-white':
                          !clickable?'text-slate-300 dark:text-slate-700 cursor-not-allowed':
                          count>0?'bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 hover:bg-brand-100 dark:hover:bg-brand-900/50':
                          'hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300'}
                        ${isSunday&&!isToday?'opacity-60':''}`}>
                        <span>{d.getDate()}</span>
                        {count>0&&<span className={`absolute bottom-1 text-[8px] px-1 rounded-full ${isToday?'bg-white/30':'bg-brand-600 text-white'}`}>{count}</span>}
                    </button>
                })}
            </div>
        </Card>
        <p className="text-[10px] text-center text-slate-400">Tap en un día (L a S) para ver/agendar</p>
    </div>
};

// Normaliza un valor de pieza al formato nuevo {general, caras: {oclusal, vestibular...}, corona_tipo}
const normTooth=v=>{
    if(!v)return{general:'sano',caras:{}};
    if(typeof v==='string')return{general:v,caras:{}};
    return{general:v.general||'sano',caras:v.caras||{},corona_tipo:v.corona_tipo};
};

// SVG de un diente con 5 caras clickeables + indicador de selección múltiple
const ToothSVG=({n,data,onClick,selected})=>{
    const t=normTooth(data);
    const whole=TOOTH_WHOLE[t.general]||TOOTH_WHOLE.sano;
    const fc=face=>(TOOTH_FACE[t.caras[face]]||TOOTH_FACE.sano);
    const isGone=t.general==='ausente';
    const isExtraer=t.general==='extraccion';
    const wholeColored=t.general!=='sano'&&!['extraccion_planificada'].includes(t.general);

    return<g style={{cursor:'pointer'}} onClick={e=>onClick(n,'general',e)}>
        <polygon points="0,0 40,0 28,12 12,12" fill={fc('vestibular').color} stroke="#64748b" strokeWidth="0.5" onClick={e=>{e.stopPropagation();onClick(n,'vestibular',e)}}/>

        <polygon points="0,0 0,40 12,28 12,12" fill={fc('mesial').color} stroke="#64748b" strokeWidth="0.5" onClick={e=>{e.stopPropagation();onClick(n,'mesial',e)}}/>
        <polygon points="40,0 40,40 28,28 28,12" fill={fc('distal').color} stroke="#64748b" strokeWidth="0.5" onClick={e=>{e.stopPropagation();onClick(n,'distal',e)}}/>
        <rect x="12" y="12" width="16" height="16" fill={fc('oclusal').color} stroke="#64748b" strokeWidth="0.5" onClick={e=>{e.stopPropagation();onClick(n,'oclusal',e)}}/>

        {wholeColored&&!isGone&&!isExtraer&&<rect x="0" y="0" width="40" height="40" fill={whole.color} fillOpacity="0.55" stroke={whole.border} strokeWidth="2" pointerEvents="none"/>}
        {isExtraer&&<><line x1="2" y1="2" x2="38" y2="38" stroke="#dc2626" strokeWidth="3" pointerEvents="none"/><line x1="38" y1="2" x2="2" y2="38" stroke="#dc2626" strokeWidth="3" pointerEvents="none"/></>}
        {isGone&&<rect x="0" y="0" width="40" height="40" fill="#1f2937" pointerEvents="none"/>}
        {t.general==='inflamacion'&&<circle cx="20" cy="38" r="3" fill="#dc2626" pointerEvents="none"/>}
        {t.general==='implante'&&<rect x="17" y="-2" width="6" height="12" fill="#10b981" stroke="#047857" pointerEvents="none"/>}
        {selected&&<rect x="0" y="0" width="40" height="40" fill="none" stroke="#4f46e5" strokeWidth="3" strokeDasharray="4 2" pointerEvents="none"/>}
    </g>
};

const Odontogram=({value,onChange,onSave,patient,hist,users,user,onHistReload})=>{
    const[denticion,setDenticion]=useState('adulto'); // 'adulto'|'pediatrico'
    const[multi,setMulti]=useState(false);
    const[selPiezas,setSelPiezas]=useState(new Set()); // para modo múltiple
    const[brush,setBrush]=useState(null); // {kind:'general'|'face'|'corona', state:'caries'/'corona'/etc, coronaTipo?}
    const[noteFilter,setNoteFilter]=useState('todas');
    const[noteForm,setNoteForm]=useState({pieza:'',cara:'',texto:''});
    const[generalForm,setGeneralForm]=useState({texto:'',dr:user?.role===Role.ODONTOLOGO?user.name:''});
    const[showGeneral,setShowGeneral]=useState(false);

    const PIEZAS_UP=denticion==='adulto'?UPPER:UPPER_PED;
    const PIEZAS_LO=denticion==='adulto'?LOWER:LOWER_PED;
    const PIEZAS_ALL=[...PIEZAS_UP,...PIEZAS_LO];

    // Aplica un brush a una pieza+cara
    const applyBrush=(n,target)=>{
        if(!brush){
            // Si no hay pincel, en modo múltiple solo selecciona; en individual abre modal viejo (deshabilitado en este rediseño - sólo selecciona)
            if(multi){
                setSelPiezas(s=>{const x=new Set(s);x.has(n)?x.delete(n):x.add(n);return x});
            }
            return;
        }
        const piezas=multi&&selPiezas.size>0?Array.from(selPiezas):[n];
        const newVal={...(value||{})};
        for(const p of piezas){
            const cur=normTooth(newVal[p]);
            let next={...cur};
            if(brush.kind==='general'){next.general=brush.state;next.corona_tipo=undefined}
            else if(brush.kind==='corona'){next.general='corona';next.corona_tipo=brush.coronaTipo}
            else if(brush.kind==='face'){
                const face=target==='general'?'oclusal':target;
                next.caras={...cur.caras,[face]:brush.state};
            }
            // limpieza
            const isClean=next.general==='sano'&&Object.values(next.caras||{}).every(v=>!v||v==='sano');
            if(isClean)delete newVal[p]; else newVal[p]=next;
        }
        onChange(newVal);
        if(!multi)setSelPiezas(new Set());
    };

    const togglePiezaSel=(n)=>setSelPiezas(s=>{const x=new Set(s);x.has(n)?x.delete(n):x.add(n);return x});
    const clearAll=()=>{setSelPiezas(new Set());setBrush(null)};
    const switchToMulti=v=>{setMulti(v);if(!v)setSelPiezas(new Set())};

    const Tooth=({n})=>{
        const t=normTooth((value||{})[n]);
        return<div className="flex flex-col items-center gap-0.5 select-none">
            <span className="text-[8px] text-slate-400 font-bold h-3">{t.corona_tipo||''}</span>
            <span className="text-[8px] text-slate-400 font-bold">{n}</span>
            <svg viewBox="0 0 40 40" width="32" height="32" className="hover:scale-110 transition-transform">
                <ToothSVG n={n} data={t} selected={selPiezas.has(n)} onClick={(num,target)=>applyBrush(num,target)}/>
            </svg>
        </div>
    };

    // Notas: se filtran de hist las que tienen formato [Pieza N]
    const notasOdo=useMemo(()=>{
        if(!hist)return[];
        return hist.filter(h=>h.tipo==='EVOLUCION'&&/^\[Pieza\s+(\d+)/.test(h.motivo||''));
    },[hist]);
    const notasFiltradas=useMemo(()=>noteFilter==='todas'?notasOdo:notasOdo.filter(n=>{const m=/^\[Pieza\s+(\d+)/.exec(n.motivo);return m&&m[1]===String(noteFilter)}),[notasOdo,noteFilter]);

    const piezasConNotas=useMemo(()=>{const s=new Set();for(const n of notasOdo){const m=/^\[Pieza\s+(\d+)/.exec(n.motivo);if(m)s.add(m[1])}return Array.from(s).sort()},[notasOdo]);

    const saveNota=async()=>{
        if(!noteForm.pieza||!noteForm.texto)return toast.warn('Seleccione pieza y escriba la nota');
        const dr=user?.role===Role.ODONTOLOGO?user.name:(generalForm.dr||'Sistema');
        const motivo=`[Pieza ${noteForm.pieza}${noteForm.cara?` - ${FACE_LABELS[noteForm.cara]||noteForm.cara}`:''}] ${noteForm.texto}`;
        const r=await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:dr,motivo,tipo:'EVOLUCION',deleted:false});
        if(r){setNoteForm({pieza:'',cara:'',texto:''});toast.ok('Nota guardada');if(onHistReload)onHistReload()}
    };

    const saveGeneral=async()=>{
        if(!generalForm.texto)return toast.warn('Escriba el tratamiento');
        if(!generalForm.dr)return toast.warn('Seleccione odontólogo');
        const r=await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:generalForm.dr,motivo:generalForm.texto,tipo:'EVOLUCION',deleted:false});
        if(r){setGeneralForm({texto:'',dr:user?.role===Role.ODONTOLOGO?user.name:''});setShowGeneral(false);toast.ok('Tratamiento guardado');if(onHistReload)onHistReload()}
    };

    const delNota=async h=>{if(!confirm('¿Eliminar esta nota?'))return;await DB.update('history',h.id,{deleted:true});if(onHistReload)onHistReload()};

    // Helper: elegir un brush
    const BrushBtn=({kind,state,label,color,border,dark,coronaTipo})=>{
        const isActive=brush&&brush.kind===kind&&brush.state===state&&(coronaTipo?brush.coronaTipo===coronaTipo:true);
        return<button onClick={()=>setBrush(isActive?null:{kind,state,coronaTipo})} className={`p-1.5 rounded-md border-2 text-[9px] font-bold transition-all ${isActive?'ring-2 ring-brand-500 ring-offset-1 dark:ring-offset-slate-800':''}`} style={{background:color,borderColor:border,color:dark?'#fff':'#1f2937'}}>{label}</button>;
    };

    return<div className="space-y-3 animate-fade-in">
        {/* Header con switches y guardar */}
        <Card className="p-3">
            <div className="flex flex-wrap gap-2 items-center justify-between">
                <div className="flex gap-2 items-center flex-wrap">
                    <div className="flex bg-slate-100 dark:bg-slate-700 rounded-lg p-0.5">
                        <button onClick={()=>setDenticion('adulto')} className={`px-3 py-1.5 rounded text-[11px] font-bold ${denticion==='adulto'?'bg-white dark:bg-slate-900 shadow text-brand-600 dark:text-brand-400':'text-slate-500 dark:text-slate-400'}`}>Adulto</button>
                        <button onClick={()=>setDenticion('pediatrico')} className={`px-3 py-1.5 rounded text-[11px] font-bold ${denticion==='pediatrico'?'bg-white dark:bg-slate-900 shadow text-brand-600 dark:text-brand-400':'text-slate-500 dark:text-slate-400'}`}>Pediátrico</button>
                    </div>
                    <label className="flex items-center gap-1.5 text-[11px] font-bold text-slate-600 dark:text-slate-300 cursor-pointer">
                        <input type="checkbox" checked={multi} onChange={e=>switchToMulti(e.target.checked)} className="accent-brand-600"/>
                        Selección múltiple {multi&&selPiezas.size>0&&<span className="bg-brand-600 text-white px-1.5 py-0.5 rounded-full text-[9px]">{selPiezas.size}</span>}
                    </label>
                    {(brush||selPiezas.size>0)&&<button onClick={clearAll} className="text-[10px] text-red-500 hover:underline font-bold">✕ Limpiar</button>}
                </div>
                <Btn onClick={onSave} className="text-xs px-3 py-1.5"><Save size={12} className="inline mr-1"/>Guardar</Btn>
            </div>
            {brush&&<p className="text-[10px] text-brand-600 dark:text-brand-400 mt-2 font-bold">🖌️ Pincel activo: {brush.kind==='corona'?`Corona ${brush.coronaTipo}`:(TOOTH_WHOLE[brush.state]||TOOTH_FACE[brush.state])?.label} — Tap en {brush.kind==='face'?'una cara':'el diente'}{multi?'s seleccionados':''}</p>}
            {!brush&&<p className="text-[10px] text-slate-400 mt-2">{multi?'Tap en piezas para seleccionarlas, después elegí un estado de la paleta':'Elegí un estado de la paleta y luego tap en una pieza'}</p>}
        </Card>

        <div className="lg:grid lg:grid-cols-[180px_1fr_280px] lg:gap-3 space-y-3 lg:space-y-0">
            {/* Paleta de estados */}
            <Card className="p-3 lg:max-h-[80vh] lg:overflow-y-auto">
                <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Paleta</p>
                <details open className="mb-2"><summary className="cursor-pointer text-[10px] font-bold text-brand-600 dark:text-brand-400 mb-1">Por cara</summary>
                    <div className="grid grid-cols-2 gap-1">{Object.entries(TOOTH_FACE).map(([k,v])=><BrushBtn key={k} kind="face" state={k} label={v.label} color={v.color} border={v.border} dark={v.dark}/>)}</div>
                </details>
                <details open className="mb-2"><summary className="cursor-pointer text-[10px] font-bold text-brand-600 dark:text-brand-400 mb-1">Diente entero</summary>
                    <div className="grid grid-cols-1 gap-1">{Object.entries(TOOTH_WHOLE).filter(([k])=>k!=='corona').map(([k,v])=><BrushBtn key={k} kind="general" state={k} label={v.label} color={v.color} border={v.border} dark={v.dark}/>)}</div>
                </details>
                <details className="mb-2"><summary className="cursor-pointer text-[10px] font-bold text-brand-600 dark:text-brand-400 mb-1">Coronas</summary>
                    <div className="grid grid-cols-2 gap-1">{Object.entries(CROWN_TYPES).map(([k,v])=><BrushBtn key={k} kind="corona" state="corona" coronaTipo={k} label={k} color="#a855f7" border="#7e22ce" dark={true}/>)}</div>
                </details>
            </Card>

            {/* Odontograma */}
            <Card className="p-3 overflow-x-auto">
                <div className="min-w-[600px] space-y-1">
                    <div className="flex justify-center gap-1 flex-wrap">{PIEZAS_UP.map(n=><Tooth key={n} n={n}/>)}</div>
                    <div className="border-t border-dashed border-slate-300 dark:border-slate-600 my-2"/>
                    <div className="flex justify-center gap-1 flex-wrap">{PIEZAS_LO.map(n=><Tooth key={n} n={n}/>)}</div>
                </div>
            </Card>

            {/* Panel de notas */}
            <Card className="p-3 lg:max-h-[80vh] lg:overflow-y-auto">
                <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Notas / Tratamientos</p>

                {/* Form para nota nueva */}
                <div className="space-y-2 mb-3 pb-3 border-b border-slate-200 dark:border-slate-700">
                    <Select value={noteForm.pieza} onChange={e=>setNoteForm({...noteForm,pieza:e.target.value})} className="text-xs py-1.5">
                        <option value="">Pieza...</option>
                        {selPiezas.size===1&&<option value={Array.from(selPiezas)[0]}>Pieza {Array.from(selPiezas)[0]} (seleccionada)</option>}
                        {PIEZAS_ALL.map(n=><option key={n} value={n}>Pieza {n}</option>)}
                    </Select>
                    <Select value={noteForm.cara} onChange={e=>setNoteForm({...noteForm,cara:e.target.value})} className="text-xs py-1.5">
                        <option value="">Sin cara específica</option>
                        {Object.entries(FACE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                    </Select>
                    <Textarea value={noteForm.texto} onChange={e=>setNoteForm({...noteForm,texto:e.target.value})} placeholder="Nota / tratamiento..." className="h-14 resize-none text-xs"/>
                    <Btn onClick={saveNota} className="w-full py-1.5 text-[11px]">+ Agregar nota</Btn>
                    <Btn onClick={()=>setShowGeneral(s=>!s)} variant="secondary" className="w-full py-1.5 text-[11px]">{showGeneral?'✕ Cancelar':'+ Tratamiento general (sin pieza)'}</Btn>
                    {showGeneral&&<div className="space-y-2 p-2 bg-slate-50 dark:bg-slate-700/30 rounded-lg">
                        <Select value={generalForm.dr} onChange={e=>setGeneralForm({...generalForm,dr:e.target.value})} className="text-xs py-1.5"><option value="">Odontólogo...</option>{(users||[]).map(u=><option key={u.id} value={u.name}>{u.name}</option>)}</Select>
                        <Textarea value={generalForm.texto} onChange={e=>setGeneralForm({...generalForm,texto:e.target.value})} placeholder="Ej: Limpieza, profilaxis, fluorización..." className="h-14 resize-none text-xs"/>
                        <Btn onClick={saveGeneral} variant="success" className="w-full py-1.5 text-[11px]">Guardar</Btn>
                    </div>}
                </div>

                {/* Filtro y lista */}
                <Select value={noteFilter} onChange={e=>setNoteFilter(e.target.value)} className="text-xs py-1.5 mb-2">
                    <option value="todas">Todas las piezas</option>
                    {piezasConNotas.map(p=><option key={p} value={p}>Pieza {p}</option>)}
                </Select>
                <div className="space-y-2">
                    {notasFiltradas.map(n=>{const m=/^\[Pieza\s+(\d+)([^\]]*)\]\s*(.*)$/s.exec(n.motivo);const pieza=m?m[1]:'';const sub=m?m[2]:'';const txt=m?m[3]:n.motivo;return<div key={n.id} className="bg-slate-50 dark:bg-slate-700/30 p-2 rounded-lg text-[11px]">
                        <div className="flex justify-between items-start gap-1 mb-1">
                            <div className="min-w-0 flex-1">
                                <p className="font-bold text-brand-600 dark:text-brand-400">Pieza {pieza}{sub.replace(' - ',' › ')}</p>
                                <p className="text-[9px] text-slate-400">{n.fecha} · Dr. {n.odontologo}</p>
                            </div>
                            <button onClick={()=>delNota(n)} className="text-red-400 shrink-0 p-1"><Trash2 size={11}/></button>
                        </div>
                        <p className="text-slate-700 dark:text-slate-200">{txt}</p>
                    </div>})}
                    {notasFiltradas.length===0&&<p className="text-[10px] text-slate-400 text-center py-3">{noteFilter==='todas'?'Sin notas registradas':'Sin notas para esta pieza'}</p>}
                </div>
            </Card>
        </div>

        {/* Leyenda colapsable */}
        <Card className="p-3">
            <details><summary className="cursor-pointer text-[11px] font-bold text-slate-500 dark:text-slate-400">Ver leyenda completa</summary>
                <div className="space-y-2 mt-2">
                    <div><p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase">Por cara</p><div className="grid grid-cols-2 sm:grid-cols-4 gap-1 text-[9px]">{Object.entries(TOOTH_FACE).map(([k,v])=><div key={k} className="flex items-center gap-1"><div className="w-3 h-3 rounded" style={{background:v.color,border:`1px solid ${v.border}`}}/><span>{v.label}</span></div>)}</div></div>
                    <div><p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase">Por diente entero</p><div className="grid grid-cols-2 sm:grid-cols-4 gap-1 text-[9px]">{Object.entries(TOOTH_WHOLE).map(([k,v])=><div key={k} className="flex items-center gap-1"><div className="w-3 h-3 rounded" style={{background:v.color,border:`1px solid ${v.border}`}}/><span>{v.label}</span></div>)}</div></div>
                    <div><p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase">Tipos de corona</p><div className="grid grid-cols-2 sm:grid-cols-3 gap-1 text-[9px]">{Object.entries(CROWN_TYPES).map(([k,v])=><div key={k} className="flex items-center gap-1"><span className="font-bold text-purple-600 dark:text-purple-400 w-6">{k}</span><span>{v}</span></div>)}</div></div>
                </div>
            </details>
        </Card>
    </div>
};

// ===== HUB DE PACIENTE (centralizado) =====
const PatientHub=({user,patientId,onBack})=>{
    const[patient,setPatient]=useState(null);
    const[tab,setTab]=useState('resumen');
    const[medRec,setMedRec]=useState(null);
    const[hist,setHist]=useState([]);
    const[imgs,setImgs]=useState([]);
    const[apps,setApps]=useState([]);
    const[users,setUsers]=useState([]);
    const[treatments,setTreatments]=useState([]);
    const[clinic,setClinic]=useState(null);
    const[loading,setLoading]=useState(true);

    useEffect(()=>{loadAll()},[patientId]);
    const firstHubLoad=useRef(true);
    const loadAll=async(opts={})=>{
        const silent=opts?.silent||!firstHubLoad.current;
        if(!silent)setLoading(true);
        const[p,m,h,i,a,u,t,c]=await Promise.all([
            S.getPatient(patientId),
            S.getMed(patientId),
            S.getHist(patientId),
            S.getImgs(patientId),
            S.getAppsByPatient(patientId),
            S.getUsers(),
            S.getTreatments(patientId),
            S.getClinicConfig()
        ]);
        setPatient(p);setMedRec(m);setHist(h);setImgs(i);setApps(a);setUsers(u.filter(x=>x.role===Role.ODONTOLOGO));setTreatments(t);setClinic(c);
        if(firstHubLoad.current){setLoading(false);firstHubLoad.current=false}
    };

    if(loading)return<div className="p-8 text-center text-slate-400"><RefreshCw className="animate-spin mx-auto mb-2" size={24}/>Cargando paciente...</div>;
    if(!patient)return<div className="p-8 text-center"><p className="text-red-500">Paciente no encontrado</p><Btn onClick={onBack} variant="secondary" className="mt-3 px-4 py-2 text-sm">Volver</Btn></div>;

    const tabs=[
        {id:'resumen',label:'Resumen',icon:UserIcon},
        {id:'ficha',label:'Ficha',icon:FileHeart},
        {id:'odo',label:'Odontograma',icon:Activity},
        {id:'historia',label:'Historia',icon:FileText},
        {id:'presup',label:'Tratamientos',icon:CreditCard},
        {id:'fotos',label:'Fotos',icon:ImageIcon},
        {id:'citas',label:'Citas',icon:Calendar},
        {id:'consent',label:'Consentimientos',icon:ClipboardList}
    ];

    const hasAlerts=medRec&&(medRec.alergias?.length>0||medRec.alergias_medicamentos?.length>0);
    const saldo=Math.max(0,(patient.presupuesto||0)-(patient.abonado||0));
    const proxCita=apps.filter(a=>!isPast(a.fecha,a.hora)).sort((a,b)=>new Date(a.fecha+'T'+a.hora)-new Date(b.fecha+'T'+b.hora))[0];
    const edad=calcEdad(patient.fecha_nacimiento);

    const Sidebar=()=><div className="space-y-3">
        <Card className="p-4">
            <div className="flex items-center gap-3 mb-3">
                <Btn onClick={onBack} variant="ghost" className="p-2 lg:hidden"><ChevronLeft size={18}/></Btn>
                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shrink-0">{(patient.nombre||'?').charAt(0).toUpperCase()}</div>
                <div className="min-w-0 flex-1">
                    <h2 className="font-bold text-base truncate">{patient.nombre}</h2>
                    {edad!==null&&<p className="text-[10px] text-slate-400">{edad} años</p>}
                </div>
            </div>
            <div className="space-y-1.5 text-xs">
                <div className="flex items-start gap-2"><span className="text-slate-400 shrink-0 w-12">CI</span><span className="font-medium truncate">{formatCI(patient.ci)}</span></div>
                {patient.telefono&&<div className="flex items-start gap-2"><span className="text-slate-400 shrink-0 w-12">Tel</span><a href={`tel:${patient.telefono}`} className="font-medium text-brand-600 dark:text-brand-400 truncate">{patient.telefono}</a></div>}
                {patient.fecha_nacimiento&&<div className="flex items-start gap-2"><span className="text-slate-400 shrink-0 w-12">F. Nac</span><span className="font-medium">{new Date(patient.fecha_nacimiento+'T00:00').toLocaleDateString('es-UY')}</span></div>}
                {patient.direccion&&<div className="flex items-start gap-2"><span className="text-slate-400 shrink-0 w-12">📍</span><span className="font-medium text-[10px] break-words">{patient.direccion}</span></div>}
            </div>
        </Card>

        {hasAlerts&&<Card className="p-3 bg-red-500 dark:bg-red-700 text-white border-red-600">
            <div className="flex items-start gap-2"><AlertTriangle size={14} className="shrink-0 mt-0.5"/><div className="text-xs"><p className="font-bold mb-0.5">⚠️ Alergias</p><p className="text-[10px]">{[...(medRec.alergias||[]),...(medRec.alergias_medicamentos||[])].join(', ')}</p></div></div>
        </Card>}

        <Card className="p-3">
            <p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Saldo</p>
            <div className="grid grid-cols-3 gap-1 text-center text-[10px]">
                <div><p className="text-slate-400">Presup.</p><p className="font-bold text-brand-600 dark:text-brand-400">${(patient.presupuesto||0).toLocaleString('es-UY')}</p></div>
                <div><p className="text-slate-400">Abonado</p><p className="font-bold text-emerald-600 dark:text-emerald-400">${(patient.abonado||0).toLocaleString('es-UY')}</p></div>
                <div><p className="text-slate-400">Saldo</p><p className="font-bold text-red-600 dark:text-red-400">${saldo.toLocaleString('es-UY')}</p></div>
            </div>
        </Card>

        {proxCita&&<Card className="p-3 border-l-4 border-l-amber-500">
            <p className="text-[10px] font-bold text-amber-600 dark:text-amber-400 uppercase mb-1">Próxima cita</p>
            <p className="text-xs font-bold">{proxCita.fecha} • {proxCita.hora}</p>
            <p className="text-[10px] text-slate-500 dark:text-slate-400">Dr. {proxCita.odontologo}</p>
        </Card>}
    </div>;

    // Tabs verticales para el sidebar en desktop

const PatientResumen=({patient,medRec,hist,apps,treatments=[],saldo,onGoTab})=>{

    const pendientes=treatments.filter(t=>{const por=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0);return por>0&&t.estado!=='rechazado'&&t.estado!=='abandonado'});
    const totalPendiente=pendientes.reduce((s,t)=>s+((parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0)),0);

        {pendientes.length>0&&<Card className="p-4 border-l-4 border-l-amber-500 cursor-pointer hover:bg-amber-50/30 dark:hover:bg-amber-900/10 transition-colors" onClick={()=>onGoTab&&onGoTab('presup')}>

        {ultPago&&<Card className="p-4 border-l-4 border-l-emerald-500">

            <p className="text-sm mt-1">{ultPago.motivo}</p>

                {medRec.alergias_medicamentos?.length>0&&<p className="text-xs mb-1"><span className="font-bold text-orange-600 dark:text-orange-400">Alergias a medicamentos:</span> {medRec.alergias_medicamentos.join(', ')}</p>}

// Helpers para parsear fechas (puede venir en formato dd/mm/yyyy o ISO)
const parseFechaUY=s=>{
    if(!s)return null;
    if(/^\d{4}-\d{2}-\d{2}/.test(s))return new Date(s);
    const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})/.exec(s);
    if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
    return new Date(s);
};
const extractMonto=motivo=>{const m=/\$\s?(\d+(?:[.,]\d+)?)/.exec(motivo||'');return m?parseFloat(m[1].replace(',','.')):0};

// ===== CONSENTIMIENTOS =====
// Render con soporte de bloques {{#menor}}...{{/menor}}
const renderTemplate=(tpl,data,esMenor)=>{
    let txt=tpl||'';
    // Bloques condicionales
    txt=txt.replace(/\{\{#menor\}\}([\s\S]*?)\{\{\/menor\}\}/g,(_,inner)=>esMenor?inner:'');
    // Reemplazo de placeholders
    txt=txt.replace(/\{\{(\w+)\}\}/g,(m,k)=>data[k]!==undefined&&data[k]!==null&&data[k]!==''?data[k]:'________');
    // Limpiar líneas en blanco múltiples
    txt=txt.replace(/\n{3,}/g,'\n\n');
    return txt;
};

// Detectar campos variables en una plantilla (los que NO son del paciente/odontólogo/fecha)
const SYSTEM_FIELDS=new Set(['nombre','ci','edad','direccion','telefono','fecha_nacimiento','odontologo','registro_profesional','dia','mes','anio','fecha','nombre_firmante','ci_firmante']);
const REPRESENTANTE_FIELDS=new Set(['nombre_representante','ci_representante','vinculo_representante']);
const extractVars=tpl=>{
    const re=/\{\{(\w+)\}\}/g;const found=new Set();let m;
    while((m=re.exec(tpl))!==null){if(!SYSTEM_FIELDS.has(m[1])&&!REPRESENTANTE_FIELDS.has(m[1]))found.add(m[1])}
    return Array.from(found);
};
const labelize=k=>k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

const ConsentModal=({tpl,patient,user,onClose,onSaved})=>{
    const edad=calcEdad(patient.fecha_nacimiento);
    const[esMenor,setEsMenor]=useState(edad!==null?edad<18:false);
    const variables=useMemo(()=>extractVars(tpl.contenido),[tpl]);
    const[varsValues,setVarsValues]=useState(()=>Object.fromEntries(variables.map(v=>[v,''])));
    const[rep,setRep]=useState({nombre_representante:'',ci_representante:'',vinculo_representante:''});
    const[recorded,setRecorded]=useState(false);const[recId,setRecId]=useState(null);

    const today=new Date();
    const data={
        nombre:patient.nombre||'',
        ci:formatCI(patient.ci),
        edad:edad!==null?`${edad} años`:'',
        direccion:patient.direccion||'',
        telefono:patient.telefono||'',
        fecha_nacimiento:patient.fecha_nacimiento?new Date(patient.fecha_nacimiento+'T00:00').toLocaleDateString('es-UY'):'',
        odontologo:user.name||'',
        registro_profesional:user.registro_msp||'',
        dia:String(today.getDate()),
        mes:MESES_ES[today.getMonth()],
        anio:String(today.getFullYear()),
        fecha:today.toLocaleDateString('es-UY'),
        nombre_firmante:esMenor?(rep.nombre_representante||patient.nombre):patient.nombre,
        ci_firmante:esMenor?(rep.ci_representante||formatCI(patient.ci)):formatCI(patient.ci),
        ...varsValues,
        ...(esMenor?rep:{})
    };
    const rendered=renderTemplate(tpl.contenido,data,esMenor);

    const registrar=async(silencioso=false)=>{
        if(recorded)return recId; // ya registrado en esta sesión
        const r=await S.saveConsentRecord({
            paciente_id:patient.id,
            template_id:tpl.id,
            titulo:tpl.titulo,
            contenido_generado:rendered,
            odontologo:user.name||'',
            es_menor:esMenor,
            representante:esMenor?rep:null,
            variables:varsValues,
            fecha_firma:today.toISOString().split('T')[0]
        });
        if(r){
            setRecorded(true);setRecId(r.id);
            if(!silencioso)toast.ok('Consentimiento registrado');
            if(onSaved)onSaved();
            return r.id;
        }
        return null;
    };

    const print=async()=>{
        await registrar(true); // silencioso al imprimir
        const w=window.open('','_blank','width=900,height=700');
        if(!w)return toast.err('Habilitá ventanas emergentes');
        w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${tpl.titulo} - ${patient.nombre}</title><style>
            @page{size:A4;margin:2cm}
            body{font-family:Georgia,'Times New Roman',serif;font-size:11pt;line-height:1.5;color:#000;max-width:18cm;margin:0 auto;padding:1cm}
            pre{white-space:pre-wrap;font-family:inherit;font-size:inherit;margin:0}
            @media print{body{padding:0}}

// Dropdown custom para estado (evita problemas de contraste de <select> nativo)
const StateDropdown=({value,onChange})=>{
    const[open,setOpen]=useState(false);
    const[pos,setPos]=useState(null);
    const btnRef=useRef(null);
    const menuRef=useRef(null);

    useEffect(()=>{
        if(!open)return;
        const onDoc=e=>{
            if(btnRef.current?.contains(e.target))return;
            if(menuRef.current?.contains(e.target))return;
            setOpen(false);
        };
        const onScroll=()=>setOpen(false);
        document.addEventListener('mousedown',onDoc);
        window.addEventListener('scroll',onScroll,true);
        window.addEventListener('resize',onScroll);
        return()=>{document.removeEventListener('mousedown',onDoc);window.removeEventListener('scroll',onScroll,true);window.removeEventListener('resize',onScroll)};
    },[open]);

    const toggle=()=>{
        if(open){setOpen(false);return}
        const r=btnRef.current?.getBoundingClientRect();
        if(!r)return;
        const menuW=176; // w-44
        const menuH=240; // aprox 5 items
        // Calcular si abrir hacia abajo o arriba según espacio disponible
        const spaceBelow=window.innerHeight-r.bottom;
        const above=spaceBelow<menuH&&r.top>menuH;
        const top=above?r.top-menuH-4:r.bottom+4;
        const left=Math.min(r.left,window.innerWidth-menuW-8);
        setPos({top,left,width:Math.max(r.width,menuW)});
        setOpen(true);
    };

    const cur=TREATMENT_STATES[value]||TREATMENT_STATES.creado;
    return<>
        <button ref={btnRef} type="button" onClick={toggle} className={`w-full flex items-center justify-between gap-1 text-[10px] px-2 py-1 rounded-full font-bold ${cur.color}`}>
            <span className="truncate">{cur.icon} {cur.label}</span>
            <span className="text-[8px] opacity-60">▼</span>
        </button>
        {open&&pos&&<Portal><div ref={menuRef} className="fixed z-[300] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-xl overflow-hidden" style={{top:pos.top,left:pos.left,width:pos.width}}>
            {Object.entries(TREATMENT_STATES).map(([k,v])=><button key={k} type="button" onClick={()=>{onChange(k);setOpen(false)}} className={`w-full text-left px-3 py-2 text-xs font-bold flex items-center gap-2 hover:bg-slate-100 dark:hover:bg-slate-700 ${k===value?'bg-slate-50 dark:bg-slate-700/50':''}`}>
                <span className="w-2 h-2 rounded-full shrink-0" style={{background:v.dot}}/>
                <span className="text-slate-700 dark:text-slate-200">{v.icon} {v.label}</span>
                {k===value&&<CheckCircle2 size={12} className="ml-auto text-emerald-500"/>}
            </button>)}
        </div></Portal>}
    </>;
};
