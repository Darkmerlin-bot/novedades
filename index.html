// Modal de comentarios
const GlobalPayModal=({pendientes,onConfirm,onClose})=>{
    const totalDebido=pendientes.reduce((s,t)=>s+(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0),0);
    const[mode,setMode]=useState('fifo'); // 'fifo' | 'manual'
    const[totalAmt,setTotalAmt]=useState(totalDebido.toString());
    const[manualAlloc,setManualAlloc]=useState(()=>{const m={};for(const t of pendientes)m[t.id]='';return m});
    const[saving,setSaving]=useState(false);

    // FIFO preview
    const fifoAllocations=useMemo(()=>{
        let restante=parseFloat(totalAmt)||0;
        const allocs={};
        for(const t of pendientes){
            const por=Math.max(0,(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0));
            const aplicar=Math.min(restante,por);
            if(aplicar>0){allocs[t.id]=aplicar;restante-=aplicar}
            if(restante<=0)break;
        }
        return{allocs,sobrante:restante};
    },[totalAmt,pendientes]);

    const manualTotal=useMemo(()=>Object.values(manualAlloc).reduce((s,v)=>s+(parseFloat(v)||0),0),[manualAlloc]);
    const manualValido=useMemo(()=>{
        for(const t of pendientes){
            const v=parseFloat(manualAlloc[t.id])||0;
            const por=Math.max(0,(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0));
            if(v<0)return{ok:false,err:'Hay montos negativos'};
            if(v>por)return{ok:false,err:`Excede saldo de "${t.descripcion}"`};
        }
        return{ok:manualTotal>0,err:manualTotal<=0?'Indique al menos un monto':null};
    },[manualAlloc,manualTotal,pendientes]);

    const aplicar=async()=>{
        setSaving(true);
        try{
            if(mode==='fifo'){
                const v=parseFloat(totalAmt)||0;
                if(v<=0)return toast.warn('Monto inválido');
                if(v>totalDebido)return toast.warn('Excede el saldo total');
                await onConfirm(fifoAllocations.allocs);
            }else{
                if(!manualValido.ok)return toast.warn(manualValido.err);
                const allocs={};
                for(const[k,v]of Object.entries(manualAlloc)){const n=parseFloat(v)||0;if(n>0)allocs[k]=n}
                await onConfirm(allocs);
            }
        }finally{setSaving(false)}
    };

    return<Portal><div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-2 sm:p-4" onClick={onClose}>
        <div className="bg-white dark:bg-slate-800 w-full sm:max-w-lg rounded-2xl flex flex-col animate-fade-in" style={{maxHeight:'calc(100vh - 1rem)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700 shrink-0">
                <div><h3 className="font-bold text-base">Pago global</h3><p className="text-xs text-slate-500 dark:text-slate-400">{pendientes.length} tratamiento{pendientes.length!==1?'s':''} pendiente{pendientes.length!==1?'s':''} · Saldo total ${totalDebido.toLocaleString('es-UY')}</p></div>
                <button onClick={onClose} className="shrink-0 p-1"><X size={20} className="text-slate-400"/></button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-3 min-h-0">
                {/* Selector de modo */}
                <div className="flex bg-slate-100 dark:bg-slate-700 rounded-lg p-0.5">
                    <button onClick={()=>setMode('fifo')} className={`flex-1 py-2 rounded text-xs font-bold ${mode==='fifo'?'bg-white dark:bg-slate-900 shadow text-brand-600 dark:text-brand-400':'text-slate-500 dark:text-slate-400'}`}>FIFO automático</button>
                    <button onClick={()=>setMode('manual')} className={`flex-1 py-2 rounded text-xs font-bold ${mode==='manual'?'bg-white dark:bg-slate-900 shadow text-brand-600 dark:text-brand-400':'text-slate-500 dark:text-slate-400'}`}>Manual</button>
                </div>

                {mode==='fifo'?<>
                    <div>
                        <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Monto total a aplicar</label>
                        <Input type="number" value={totalAmt} onChange={e=>setTotalAmt(e.target.value)} placeholder="$ 0" autoFocus/>
                        <p className="text-[10px] text-slate-400 mt-1">Se aplica primero a los tratamientos más antiguos hasta agotar el monto</p>
                    </div>

                    <Card className="p-3 bg-slate-50 dark:bg-slate-700/30">
                        <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Distribución prevista:</p>
                        <div className="space-y-1">
                            {pendientes.map(t=>{
                                const por=Math.max(0,(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0));
                                const ap=fifoAllocations.allocs[t.id]||0;
                                if(por<=0)return null;
                                return<div key={t.id} className="flex justify-between items-center text-xs gap-2">
                                    <span className="truncate flex-1">{t.descripcion}</span>
                                    <span className="text-slate-400 text-[10px] shrink-0">deuda ${por.toLocaleString('es-UY')}</span>
                                    <span className={`font-bold shrink-0 ${ap>0?'text-emerald-600 dark:text-emerald-400':'text-slate-300'}`}>+ ${ap.toLocaleString('es-UY')}</span>
                                </div>
                            })}
                        </div>
                        {fifoAllocations.sobrante>0&&<p className="text-[10px] text-amber-600 dark:text-amber-400 mt-2 font-bold">⚠️ Sobran ${fifoAllocations.sobrante.toLocaleString('es-UY')} sin asignar (excede el saldo total)</p>}
                    </Card>
                </>:<>
                    <p className="text-[10px] text-slate-400">Indicá cuánto pagar de cada tratamiento:</p>
                    <div className="space-y-2">
                        {pendientes.map(t=>{
                            const por=Math.max(0,(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0));
                            if(por<=0)return null;
                            return<div key={t.id} className="grid grid-cols-[1fr_auto_120px] gap-2 items-center text-xs bg-slate-50 dark:bg-slate-700/30 p-2 rounded-lg">
                                <span className="truncate">{t.descripcion}</span>
                                <span className="text-slate-400 text-[10px]">debe ${por.toLocaleString('es-UY')}</span>
                                <Input type="number" placeholder="0" value={manualAlloc[t.id]||''} onChange={e=>setManualAlloc(m=>({...m,[t.id]:e.target.value}))} className="text-xs py-1.5"/>
                            </div>
                        })}
                    </div>
                    <div className="flex justify-between items-center pt-2 border-t border-slate-200 dark:border-slate-700">
                        <span className="text-xs font-bold text-slate-500 dark:text-slate-400">Total a aplicar:</span>
                        <span className="font-bold text-base text-emerald-600 dark:text-emerald-400">${manualTotal.toLocaleString('es-UY')}</span>
                    </div>
                </>}
            </div>

            <div className="p-3 border-t border-slate-200 dark:border-slate-700 shrink-0 safe-bottom flex gap-2">
                <Btn onClick={aplicar} disabled={saving} variant="success" className="flex-1 py-2.5 text-sm">{saving?'Procesando...':'Confirmar pago'}</Btn>
                <Btn variant="secondary" onClick={onClose} className="flex-1 py-2.5 text-sm">Cancelar</Btn>
            </div>
        </div>
    </div></Portal>;
};

const CommentsModal=({treatment,user,onClose,onChanged})=>{
    const[comments,setComments]=useState([]);
    const[loading,setLoading]=useState(true);
    const[texto,setTexto]=useState('');
    const[saving,setSaving]=useState(false);
    const load=async()=>{setLoading(true);setComments(await S.getTreatmentComments(treatment.id));setLoading(false)};
    useEffect(()=>{load()},[treatment.id]);
    const add=async()=>{
        if(!texto.trim())return;
        setSaving(true);
        const r=await S.addTreatmentComment({treatment_id:treatment.id,autor:user.name||'Sistema',texto:texto.trim()});
        setSaving(false);
        if(r){setTexto('');load();if(onChanged)onChanged()}
    };
    const del=async(c)=>{if(!confirm('¿Eliminar este comentario?'))return;await S.delTreatmentComment(c.id);load();if(onChanged)onChanged()};
    return<Portal><div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-2 sm:p-4" onClick={onClose}>
        <div className="bg-white dark:bg-slate-800 w-full sm:max-w-md rounded-2xl flex flex-col animate-fade-in" style={{maxHeight:'calc(100vh - 1rem)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700 shrink-0">
                <div className="min-w-0 flex-1"><h3 className="font-bold text-base truncate">Comentarios</h3><p className="text-xs text-slate-500 dark:text-slate-400 truncate">{treatment.descripcion}</p></div>
                <button onClick={onClose} className="shrink-0 p-1"><X size={20} className="text-slate-400"/></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-2 min-h-0">
                {loading?<div className="text-center py-4"><RefreshCw className="animate-spin inline" size={16}/></div>
                :comments.length===0?<p className="text-xs text-slate-400 text-center py-4">Aún no hay comentarios</p>
                :comments.map(c=><div key={c.id} className="bg-slate-50 dark:bg-slate-700/30 rounded-lg p-3 text-xs">
                    <div className="flex justify-between items-start gap-2 mb-1">
                        <span className="font-bold text-brand-600 dark:text-brand-400">{c.autor||'Anónimo'}</span>
                        <div className="flex items-center gap-1 shrink-0">
                            <span className="text-[9px] text-slate-400">{new Date(c.created_at).toLocaleDateString('es-UY')} {new Date(c.created_at).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}</span>
                            <button onClick={()=>del(c)} className="text-red-400 hover:text-red-500 p-0.5"><Trash2 size={11}/></button>
                        </div>
                    </div>
                    <p className="whitespace-pre-wrap">{c.texto}</p>
                </div>)}
            </div>
            <div className="p-3 border-t border-slate-200 dark:border-slate-700 shrink-0 safe-bottom space-y-2">
                <Textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Agregar comentario..." className="h-16 resize-none text-xs"/>
                <div className="flex gap-2">
                    <Btn onClick={add} disabled={saving||!texto.trim()} className="flex-1 py-2 text-sm">{saving?'Guardando...':'Agregar comentario'}</Btn>
                    <Btn variant="secondary" onClick={onClose} className="px-4 py-2 text-sm">Cerrar</Btn>
                </div>
            </div>
        </div>
    </div></Portal>;
};

const PatientTreatments=({patient,user,onReload})=>{
    const[treatments,setTreatments]=useState([]);
    const[commentCounts,setCommentCounts]=useState({});
    const[loading,setLoading]=useState(true);
    const[filter,setFilter]=useState('todos');
    const[newItem,setNewItem]=useState({descripcion:'',cantidad:1,precio_unit:''});
    const[payTarget,setPayTarget]=useState(null);
    const[commentsTarget,setCommentsTarget]=useState(null);
    const[globalPayOpen,setGlobalPayOpen]=useState(false);
    const firstLoad=useRef(true);

    const load=async(opts={})=>{
        const silent=opts.silent||!firstLoad.current;
        if(!silent)setLoading(true);
        const ts=await S.getTreatments(patient.id);
        setTreatments(ts);
        // Cargar contadores de comentarios en paralelo
        const counts={};
        await Promise.all(ts.map(async t=>{const cs=await S.getTreatmentComments(t.id);counts[t.id]=cs.length}));
        setCommentCounts(counts);
        if(firstLoad.current){setLoading(false);firstLoad.current=false}
    };
    useEffect(()=>{load()},[patient.id]);

    const totals=useMemo(()=>{
        const filtered=treatments;
        const total=filtered.reduce((s,i)=>s+(parseFloat(i.cantidad)||0)*(parseFloat(i.precio_unit)||0),0);
        const pagado=filtered.reduce((s,i)=>s+(parseFloat(i.pagado)||0),0);
        return{total,pagado,porPagar:total-pagado};
    },[treatments]);

    const addTreatment=async()=>{
        if(!newItem.descripcion||!newItem.precio_unit)return toast.warn('Descripción y precio obligatorios');
        const tempId='temp_'+Date.now();
        const optimistic={id:tempId,paciente_id:patient.id,descripcion:newItem.descripcion,cantidad:parseFloat(newItem.cantidad)||1,precio_unit:parseFloat(newItem.precio_unit)||0,pagado:0,estado:'creado',odontologo:user.name,created_at:new Date().toISOString(),_pending:true};
        setTreatments(arr=>[optimistic,...arr]);
        setCommentCounts(c=>({...c,[tempId]:0}));
        const desc=newItem.descripcion;const qty=optimistic.cantidad;const price=optimistic.precio_unit;
        setNewItem({descripcion:'',cantidad:1,precio_unit:''});
        const r=await S.addTreatment({paciente_id:patient.id,descripcion:desc,cantidad:qty,precio_unit:price,pagado:0,estado:'creado',odontologo:user.name,deleted:false});
        if(r){
            setTreatments(arr=>arr.map(x=>x.id===tempId?{...r,_pending:false}:x));
            setCommentCounts(c=>{const nc={...c};nc[r.id]=0;delete nc[tempId];return nc});
            await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`TRATAMIENTO: ${desc} x${qty} = $${qty*price}`,tipo:'PRESUPUESTO',deleted:false});
            if(onReload)onReload({silent:true});
        }else{
            setTreatments(arr=>arr.filter(x=>x.id!==tempId));
        }
    };

    const updateField=async(id,patch)=>{
        setTreatments(arr=>arr.map(x=>x.id===id?{...x,...patch}:x));
        await S.updateTreatment(id,patch);
        if(onReload)onReload({silent:true});
    };

    const onChangeEstado=async(t,nuevo)=>{
        await updateField(t.id,{estado:nuevo});
        await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`Estado de "${t.descripcion}" cambió a ${TREATMENT_STATES[nuevo]?.label||nuevo}`,tipo:'SISTEMA',deleted:false});
    };

    const delTreatment=async(t)=>{
        if(!confirm(`¿Eliminar tratamiento "${t.descripcion}"? Los pagos quedan en el historial.`))return;
        const backup=treatments;
        setTreatments(arr=>arr.filter(x=>x.id!==t.id));
        const ok=await S.delTreatment(t.id);
        if(!ok)setTreatments(backup);
        else if(onReload)onReload({silent:true});
    };

    const confirmPay=async(t,amt)=>{
        const newPagado=(parseFloat(t.pagado)||0)+amt;
        const subtotal=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0);
        const patch={pagado:newPagado};
        if(newPagado>=subtotal&&subtotal>0){patch.estado='terminado'}
        setTreatments(arr=>arr.map(x=>x.id===t.id?{...x,...patch}:x));
        await S.updateTreatment(t.id,patch);
        await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`PAGO - ${t.descripcion}: $${amt}`,tipo:'PAGO',deleted:false});
        if(patch.estado==='terminado'){
            await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`Tratamiento "${t.descripcion}" SALDADO`,tipo:'SISTEMA',deleted:false});
        }
        setPayTarget(null);
        if(onReload)onReload({silent:true});
        toast.ok('Pago registrado');
    };

    const confirmGlobalPay=async(allocations)=>{
        // Aplicar a cada tratamiento, registrar en history
        const updates=[];
        let total=0;
        for(const[tid,amt]of Object.entries(allocations)){
            const t=treatments.find(x=>String(x.id)===String(tid));
            if(!t)continue;
            const subtotal=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0);
            const newPagado=(parseFloat(t.pagado)||0)+amt;
            const patch={pagado:newPagado};
            if(newPagado>=subtotal&&subtotal>0){patch.estado='terminado'}
            updates.push({t,patch,amt});
            total+=amt;
        }
        // Aplicar todos los cambios optimistas a la vez
        setTreatments(arr=>arr.map(x=>{const u=updates.find(u=>u.t.id===x.id);return u?{...x,...u.patch}:x}));
        // Persistir en backend
        for(const u of updates){
            await S.updateTreatment(u.t.id,u.patch);
            await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`PAGO - ${u.t.descripcion}: $${u.amt}`,tipo:'PAGO',deleted:false});
            if(u.patch.estado==='terminado'){
                await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`Tratamiento "${u.t.descripcion}" SALDADO`,tipo:'SISTEMA',deleted:false});
            }
        }
        // Registro resumen
        await S.saveHist({paciente_id:patient.id,fecha:new Date().toLocaleDateString(),odontologo:user.name,motivo:`PAGO GLOBAL: $${total} (distribuido en ${updates.length} tratamiento${updates.length!==1?'s':''})`,tipo:'SISTEMA',deleted:false});
        setGlobalPayOpen(false);
        if(onReload)onReload({silent:true});
        toast.ok(`Pago global de $${total.toLocaleString('es-UY')} aplicado`);
    };

    // Filtros
    const FILTERS=[['todos','Todos'],['creado','Creados'],['aceptado','Aceptados'],['rechazado','Rechazados'],['abandonado','Abandonados'],['terminado','Saldados']];
    const filtered=useMemo(()=>filter==='todos'?treatments:treatments.filter(t=>t.estado===filter),[treatments,filter]);
    const counts=useMemo(()=>{const c={todos:treatments.length};for(const k of Object.keys(TREATMENT_STATES))c[k]=treatments.filter(t=>t.estado===k).length;return c},[treatments]);

    // Pendientes para pago global
    const pendientes=useMemo(()=>treatments.filter(t=>{const por=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0);return por>0&&t.estado!=='rechazado'&&t.estado!=='abandonado'}),[treatments]);

    // KPIs detallados
    const kpis=useMemo(()=>{
        const aceptados=treatments.filter(t=>t.estado==='aceptado').length;
        const enCurso=treatments.filter(t=>{const p=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)-(parseFloat(t.pagado)||0);return p>0&&p<(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0)}).length;
        const saldados=treatments.filter(t=>t.estado==='terminado').length;
        const totalAceptado=treatments.filter(t=>t.estado!=='rechazado'&&t.estado!=='abandonado').reduce((s,t)=>s+(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0),0);
        const totalRechazado=treatments.filter(t=>t.estado==='rechazado'||t.estado==='abandonado').reduce((s,t)=>s+(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0),0);
        return{aceptados,enCurso,saldados,totalAceptado,totalRechazado};
    },[treatments]);

    if(loading)return<div className="p-8 text-center text-slate-400"><RefreshCw className="animate-spin mx-auto" size={20}/></div>;

    return<div className="space-y-4">
        {/* Resumen principal */}
        <Card className="p-4">
            <div className="grid grid-cols-3 gap-2 text-center mb-3">
                <div><p className="text-[10px] text-slate-400 uppercase font-bold">Total</p><p className="font-bold text-lg">${totals.total.toLocaleString('es-UY')}</p></div>
                <div><p className="text-[10px] text-slate-400 uppercase font-bold">Cobrado</p><p className="font-bold text-lg text-emerald-600 dark:text-emerald-400">${totals.pagado.toLocaleString('es-UY')}</p></div>
                <div><p className="text-[10px] text-slate-400 uppercase font-bold">Saldo</p><p className={`font-bold text-lg ${totals.porPagar>0?'text-red-600 dark:text-red-400':'text-emerald-600 dark:text-emerald-400'}`}>${totals.porPagar.toLocaleString('es-UY')}</p></div>
            </div>
            {/* Barra de progreso de cobro */}
            {totals.total>0&&<div className="mb-3">
                <div className="flex justify-between text-[9px] text-slate-400 mb-1"><span>Progreso de cobro</span><span>{Math.round((totals.pagado/totals.total)*100)}%</span></div>
                <div className="h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-emerald-500 to-emerald-400" style={{width:`${Math.min(100,(totals.pagado/totals.total)*100)}%`}}/></div>
            </div>}
            {/* KPIs secundarios */}
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center pt-3 border-t border-slate-200 dark:border-slate-700">
                <div><p className="text-[9px] text-slate-400 uppercase">Tratamientos</p><p className="font-bold text-sm">{treatments.length}</p></div>
                <div><p className="text-[9px] text-slate-400 uppercase">En curso</p><p className="font-bold text-sm text-amber-600 dark:text-amber-400">{kpis.enCurso}</p></div>
                <div><p className="text-[9px] text-slate-400 uppercase">Saldados</p><p className="font-bold text-sm text-emerald-600 dark:text-emerald-400">{kpis.saldados}</p></div>
                <div><p className="text-[9px] text-slate-400 uppercase">Pendientes</p><p className="font-bold text-sm text-red-600 dark:text-red-400">{pendientes.length}</p></div>
            </div>
            {/* Botón de pago global */}
            {pendientes.length>1&&totals.porPagar>0&&<Btn onClick={()=>setGlobalPayOpen(true)} variant="success" className="w-full mt-3 py-2 text-xs"><DollarSign size={14} className="inline mr-1"/>Pago global ({pendientes.length} pendientes · ${totals.porPagar.toLocaleString('es-UY')})</Btn>}
        </Card>

        {/* Filtros */}
        <div className="flex gap-1 overflow-x-auto scrollbar-hide pb-1">
            {FILTERS.map(([k,l])=>{const c=counts[k]||0;const active=filter===k;return<button key={k} onClick={()=>setFilter(k)} className={`shrink-0 flex items-center gap-1 px-3 py-1.5 rounded-full text-[11px] font-bold whitespace-nowrap ${active?'bg-brand-600 text-white':'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400'}`}>
                {l}
                {c>0&&<span className={`text-[9px] px-1.5 rounded-full ${active?'bg-white/30':'bg-slate-200 dark:bg-slate-600'}`}>{c}</span>}
            </button>})}
        </div>

        {/* Tabla de tratamientos estilo Doctocliq */}
        <Card className="overflow-hidden">
            {/* Header de columnas (sólo desktop) */}
            <div className="hidden md:grid grid-cols-[110px_1fr_60px_100px_90px_90px_70px_70px] gap-2 items-center px-3 py-2.5 bg-slate-700 dark:bg-slate-900 text-white text-[10px] font-bold uppercase tracking-wide">
                <div>Estado</div>
                <div>Tratamiento</div>
                <div className="text-center">Cant.</div>
                <div className="text-right">Precio Unit.</div>
                <div className="text-right">Pagado</div>
                <div className="text-right">Por pagar</div>
                <div className="text-center">Coment.</div>
                <div></div>
            </div>

            <div className="divide-y divide-slate-200 dark:divide-slate-700">
                {filtered.map(t=>{
                    const subtotal=(parseFloat(t.cantidad)||0)*(parseFloat(t.precio_unit)||0);
                    const pagado=parseFloat(t.pagado)||0;
                    const porPagar=subtotal-pagado;
                    const saldado=porPagar<=0&&subtotal>0;
                    const st=TREATMENT_STATES[t.estado]||TREATMENT_STATES.creado;
                    const cc=commentCounts[t.id]||0;
                    return<div key={t.id} className={`px-3 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-700/30 ${t._pending?'opacity-60':''}`}>
                        {/* Desktop */}
                        <div className="hidden md:grid grid-cols-[110px_1fr_60px_100px_90px_90px_70px_70px] gap-2 items-center text-xs">
                            <div>
                                <StateDropdown value={t.estado} onChange={v=>onChangeEstado(t,v)}/>
                            </div>
                            <div className="font-medium truncate" title={t.descripcion}>{t.descripcion}</div>
                            <div className="text-center text-slate-600 dark:text-slate-300">{t.cantidad}</div>
                            <div className="text-right text-slate-600 dark:text-slate-300">{(parseFloat(t.precio_unit)||0).toLocaleString('es-UY')}</div>
                            <div className="text-right text-slate-600 dark:text-slate-300">{pagado.toLocaleString('es-UY')}</div>
                            <div className={`text-right font-bold ${saldado?'text-emerald-600 dark:text-emerald-400':porPagar>0?'text-red-600 dark:text-red-400':'text-slate-500'}`}>{porPagar.toLocaleString('es-UY')}</div>
                            <div className="text-center">
                                <button onClick={()=>setCommentsTarget(t)} className="relative inline-flex items-center gap-1 px-2 py-1 rounded-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 text-[10px] font-bold">
                                    💬 {cc>0&&<span className="bg-brand-600 text-white text-[9px] px-1 rounded-full min-w-[14px]">{cc}</span>}
                                </button>
                            </div>
                            <div className="flex gap-1 justify-end">
                                {saldado?<span className="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 px-2 py-1 rounded-full text-[10px] font-bold">✓</span>
                                :<button onClick={()=>setPayTarget(t)} className="border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 px-2 py-1 rounded-full text-[10px] font-bold">Pagar</button>}
                                <button onClick={()=>delTreatment(t)} className="text-slate-400 hover:text-red-500 p-1"><Trash2 size={12}/></button>
                            </div>
                        </div>

                        {/* Mobile vertical */}
                        <div className="md:hidden">
                            <div className="flex items-center gap-2 mb-2">
                                <div className="shrink-0"><StateDropdown value={t.estado} onChange={v=>onChangeEstado(t,v)}/></div>
                                <p className="font-bold text-xs flex-1 truncate">{t.descripcion}</p>
                            </div>
                            <div className="grid grid-cols-4 gap-1 text-[10px] mb-2">
                                <div className="text-center"><p className="text-slate-400 text-[9px]">Cant.</p><p>{t.cantidad}</p></div>
                                <div className="text-center"><p className="text-slate-400 text-[9px]">Precio</p><p>${(parseFloat(t.precio_unit)||0).toLocaleString('es-UY')}</p></div>
                                <div className="text-center"><p className="text-slate-400 text-[9px]">Pagado</p><p>${pagado.toLocaleString('es-UY')}</p></div>
                                <div className="text-center"><p className="text-slate-400 text-[9px]">Saldo</p><p className={`font-bold ${saldado?'text-emerald-600 dark:text-emerald-400':'text-red-600 dark:text-red-400'}`}>${porPagar.toLocaleString('es-UY')}</p></div>
                            </div>
                            <div className="flex gap-2 items-center">
                                <button onClick={()=>setCommentsTarget(t)} className="flex-1 inline-flex items-center justify-center gap-1 px-2 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-[10px] font-bold">
                                    💬 {cc} comentario{cc!==1?'s':''}
                                </button>
                                {saldado?<span className="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 px-3 py-1.5 rounded-lg text-[10px] font-bold">✓ Saldado</span>
                                :<button onClick={()=>setPayTarget(t)} className="border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded-lg text-[10px] font-bold">Pagar</button>}
                                <button onClick={()=>delTreatment(t)} className="text-slate-400 hover:text-red-500 p-1.5"><Trash2 size={12}/></button>
                            </div>
                        </div>

            <div className="p-3 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/30 grid grid-cols-12 gap-2">
                <Input className="col-span-12 sm:col-span-6 text-xs py-1.5" placeholder="Descripción del tratamiento" value={newItem.descripcion} onChange={e=>setNewItem({...newItem,descripcion:e.target.value})}/>
                <Input type="number" className="col-span-4 sm:col-span-2 text-xs py-1.5" placeholder="Cant" value={newItem.cantidad} onChange={e=>setNewItem({...newItem,cantidad:e.target.value})}/>

            </div>

        {payTarget&&<PayModal item={payTarget} onConfirm={amt=>confirmPay(payTarget,amt)} onClose={()=>setPayTarget(null)}/>}
        {commentsTarget&&<CommentsModal treatment={commentsTarget} user={user} onClose={()=>setCommentsTarget(null)} onChanged={()=>load({silent:true})}/>}
        {globalPayOpen&&<GlobalPayModal pendientes={pendientes} onConfirm={confirmGlobalPay} onClose={()=>setGlobalPayOpen(false)}/>}
    </div>
};

const PatientsList=({user,onOpen})=>{
    const[pts,setPts]=useState([]);const[search,setSearch]=useState('');
    const[form,setForm]=useState({nombre:'',ci:'',telefono:'',email:'',fecha_nacimiento:'',direccion:''});const[editId,setEditId]=useState(null);
    const[cond,setCond]=useState({});const[saving,setSaving]=useState(false);const[ciDisplay,setCiDisplay]=useState('');const[showForm,setShowForm]=useState(false);

    useEffect(()=>{load()},[]);
    const load=async()=>{const p=await S.getPatients();setPts(p);const c={};for(const pt of p)c[pt.id]=await S.hasCond(pt.id);setCond(c)};
    const handleCIChange=e=>{const raw=e.target.value.replace(/\D/g,'').substring(0,8);setForm({...form,ci:raw});setCiDisplay(formatCI(raw))};
    const blank={nombre:'',ci:'',telefono:'',email:'',fecha_nacimiento:'',direccion:''};
    const submit=async()=>{
        if(!form.nombre||!form.ci)return toast.warn('Nombre y CI obligatorios');
        const ciDuplicate=pts.find(p=>p.ci===form.ci&&(!editId||p.id!==editId));
        if(ciDuplicate)return toast.warn(`Ya existe: ${ciDuplicate.nombre}`);
        setSaving(true);
        try{
            const payload={...form,fecha_nacimiento:form.fecha_nacimiento||null};
            const r=editId?await S.savePatient({id:editId,...payload}):await S.savePatient(payload);
            if(r){setForm(blank);setCiDisplay('');setEditId(null);setShowForm(false);await load();toast.ok(editId?'Actualizado':'Creado')}
        }finally{setSaving(false)}
    };
    const delPatient=async(p,e)=>{e.stopPropagation();if(!confirm(`¿Eliminar a ${p.nombre}?`))return;if(!confirm('¿Seguro? No se puede deshacer'))return;await S.delPatient(p.id);load()};
    const editPatient=(p,e)=>{e.stopPropagation();setEditId(p.id);setForm({nombre:p.nombre,ci:p.ci,telefono:p.telefono||'',email:p.email||'',fecha_nacimiento:p.fecha_nacimiento||'',direccion:p.direccion||''});setCiDisplay(formatCI(p.ci));setShowForm(true)};
    const filtered=pts.filter(p=>(p.nombre||'').toLowerCase().includes(search.toLowerCase())||(p.ci||'').includes(search));

    return<div className="space-y-4 animate-fade-in">
        {!showForm?<Btn onClick={()=>setShowForm(true)} className="w-full py-3"><UserPlus size={16} className="inline mr-2"/>Nuevo Paciente</Btn>
        :<Card className="p-4">
            <div className="flex justify-between items-center mb-3"><SectionTitle icon={UserPlus}>{editId?'Editar':'Nuevo'} Paciente</SectionTitle><button onClick={()=>{setShowForm(false);setEditId(null);setForm(blank);setCiDisplay('')}}><X size={18} className="text-slate-400"/></button></div>
            <div className="grid grid-cols-2 gap-2">
                <Input placeholder="Nombre *" value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} className="col-span-2" disabled={saving}/>
                <Input placeholder="CI * (2.555.555-3)" value={ciDisplay} onChange={handleCIChange} disabled={saving}/>
                <Input placeholder="Teléfono" value={form.telefono} onChange={e=>setForm({...form,telefono:e.target.value})} disabled={saving}/>
                <div className="col-span-2"><label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Fecha de nacimiento</label><Input type="date" value={form.fecha_nacimiento} onChange={e=>setForm({...form,fecha_nacimiento:e.target.value})} disabled={saving}/></div>
                <Input placeholder="Domicilio" value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})} className="col-span-2" disabled={saving}/>
            </div>
            <Btn onClick={submit} disabled={saving} className="w-full mt-3 py-2.5 text-sm">{saving?'Guardando...':'Guardar'}</Btn>
        </Card>}
        <Card className="overflow-hidden">
            <div className="p-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50"><div className="relative"><Search className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" size={14}/><Input placeholder="Buscar nombre o CI..." value={search} onChange={e=>setSearch(e.target.value)} className="pl-8 py-2"/></div></div>
            <div className="divide-y divide-slate-200 dark:divide-slate-700 max-h-[60vh] overflow-auto">
                {filtered.map(p=><button key={p.id} onClick={()=>onOpen(p.id)} className={`w-full p-3 text-left hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors ${cond[p.id]?'border-l-4 border-pink-500 bg-pink-50/50 dark:bg-pink-900/10':''}`}>
                    <div className="flex justify-between items-center gap-2">
                        <div className="min-w-0 flex-1"><p className="font-bold text-sm truncate">{p.nombre}{cond[p.id]&&<span className="ml-1 bg-pink-500 text-white text-[8px] px-1.5 py-0.5 rounded-full">⚠️</span>}</p><p className="text-[10px] text-slate-400">CI: {formatCI(p.ci)} • Tel: {p.telefono||'-'}</p></div>
                        <div className="flex gap-1 shrink-0">
                            <span onClick={e=>editPatient(p,e)} className="p-2 text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-900/30 rounded cursor-pointer"><Edit2 size={14}/></span>
                            <span onClick={e=>delPatient(p,e)} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded cursor-pointer"><Trash2 size={14}/></span>
                        </div>
                    </div>
                </button>)}
                {filtered.length===0&&<div className="p-8 text-center text-slate-300 dark:text-slate-600 text-xs">{search?'Sin resultados':'Sin pacientes'}</div>}
            </div>
        </Card>
    </div>
};

const TemplatesPanel=()=>{
    const[tpls,setTpls]=useState([]);const[loading,setLoading]=useState(true);
    const[edit,setEdit]=useState(null);const[saving,setSaving]=useState(false);
    const load=async()=>{setLoading(true);setTpls(await S.getAllTemplates());setLoading(false)};
    useEffect(()=>{load()},[]);
    const save=async()=>{
        if(!edit.titulo||!edit.contenido)return toast.warn('Título y contenido obligatorios');
        setSaving(true);
        const r=await S.saveTemplate(edit);
        setSaving(false);
        if(r){toast.ok('Plantilla guardada');setEdit(null);load()}
    };
    const del=async t=>{if(!confirm(`¿Eliminar plantilla "${t.titulo}"?`))return;if(await S.delTemplate(t.id)){toast.ok('Eliminada');load()}};
    const toggle=async t=>{await S.saveTemplate({...t,activo:!t.activo});load()};

    if(edit)return<Card className="p-4 space-y-3">
        <SectionTitle>{edit.id?'Editar':'Nueva'} Plantilla</SectionTitle>
        <Input placeholder="Título (ej: Endodoncia, Extracción...)" value={edit.titulo} onChange={e=>setEdit({...edit,titulo:e.target.value})}/>
        <div>
            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Contenido (usar placeholders {`{{nombre}}`}, {`{{ci}}`}, etc.)</label>
            <Textarea value={edit.contenido} onChange={e=>setEdit({...edit,contenido:e.target.value})} className="h-96 font-mono text-[11px]"/>
        </div>
        <Input type="number" placeholder="Orden (menor = arriba)" value={edit.orden||0} onChange={e=>setEdit({...edit,orden:parseInt(e.target.value)||0})}/>
        <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded-lg text-[10px] space-y-1">
            <p className="font-bold text-slate-600 dark:text-slate-300">Placeholders disponibles:</p>
            <p className="text-slate-500 dark:text-slate-400">Datos del paciente: {`{{nombre}} {{ci}} {{edad}} {{direccion}} {{telefono}} {{fecha_nacimiento}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Datos del odontólogo: {`{{odontologo}} {{registro_profesional}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Fecha actual: {`{{dia}} {{mes}} {{anio}} {{fecha}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Firmante (paciente o representante si es menor): {`{{nombre_firmante}} {{ci_firmante}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Si es menor: {`{{nombre_representante}} {{ci_representante}} {{vinculo_representante}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Bloque condicional para datos de menor: {`{{#menor}}...{{/menor}}`}</p>
            <p className="text-slate-500 dark:text-slate-400">Cualquier otro {`{{xxx}}`} se pedirá al usuario al imprimir (ej: {`{{pieza_dental}} {{diagnostico}}`})</p>
        </div>
        <div className="flex gap-2">
            <Btn onClick={save} disabled={saving} className="flex-1 py-2.5 text-sm">{saving?'Guardando...':'Guardar'}</Btn>
            <Btn variant="secondary" onClick={()=>setEdit(null)} className="flex-1 py-2.5 text-sm">Cancelar</Btn>
        </div>
    </Card>;

    return<div className="space-y-3">
        <Btn onClick={()=>setEdit({titulo:'',contenido:'',activo:true,orden:tpls.length})} className="w-full py-3"><PlusCircle size={16} className="inline mr-2"/>Nueva Plantilla</Btn>
        {loading?<div className="p-8 text-center"><RefreshCw className="animate-spin mx-auto" size={20}/></div>
        :<Card className="overflow-hidden divide-y divide-slate-200 dark:divide-slate-700">
            {tpls.map(t=><div key={t.id} className="p-3 flex items-center gap-2">
                <FileText size={18} className={t.activo?'text-brand-600 dark:text-brand-400 shrink-0':'text-slate-300 dark:text-slate-600 shrink-0'}/>
                <div className="flex-1 min-w-0">
                    <p className={`font-bold text-sm truncate ${!t.activo?'text-slate-400 line-through':''}`}>{t.titulo}</p>
                    <p className="text-[10px] text-slate-400">Orden: {t.orden||0} • {t.activo?'Activa':'Inactiva'}</p>
                </div>
                <button onClick={()=>toggle(t)} className={`p-2 rounded ${t.activo?'text-emerald-500':'text-slate-400'}`} title={t.activo?'Desactivar':'Activar'}>{t.activo?<CheckCircle2 size={16}/>:<XCircle size={16}/>}</button>
                <button onClick={()=>setEdit(t)} className="p-2 text-brand-500"><Edit2 size={14}/></button>
                <button onClick={()=>del(t)} className="p-2 text-red-400"><Trash2 size={14}/></button>
            </div>)}
            {tpls.length===0&&<div className="p-8 text-center text-slate-300 dark:text-slate-600 text-xs">Sin plantillas</div>}
        </Card>}
    </div>
};

// ===== ADMIN =====
const Admin=({user,online,onUserUpdated})=>{
    const isAdmin=user.role===Role.ADMIN;
    const[tab,setTab]=useState(isAdmin?'users':'profile');
    const[users,setUsers]=useState([]);
    const[uForm,setUForm]=useState({name:'',username:'',email:'',password:'',role:Role.USUARIO});
    const[editId,setEditId]=useState(null);const[saving,setSaving]=useState(false);
    const[profile,setProfile]=useState({name:user.name||'',registro_msp:user.registro_msp||''});
    const[profileSaving,setProfileSaving]=useState(false);
    const[clinic,setClinic]=useState(null);
    const[clinicSaving,setClinicSaving]=useState(false);
    const fileRef=useRef();
    const logoRef=useRef();

    useEffect(()=>{if(tab==='users')S.getUsers().then(setUsers)},[tab]);
    useEffect(()=>{if(tab==='clinic'&&!clinic)S.getClinicConfig().then(c=>setClinic(c||{nombre:'Arte Dental',subtitulo:'Consultorio Odontológico',ciudad:'Montevideo',pais:'Uruguay'}))},[tab]);

    const saveUser=async()=>{
        setSaving(true);
        try{
            if(editId){
                if(!uForm.name||!uForm.username)return toast.warn('Nombre y usuario obligatorios');
                const r=await S.updateUserMeta({id:editId,name:uForm.name,username:uForm.username,role:uForm.role});
                if(r){setUForm({name:'',username:'',email:'',password:'',role:Role.USUARIO});setEditId(null);setUsers(await S.getUsers());toast.ok('Usuario actualizado')}
            }else{
                if(!uForm.name||!uForm.username||!uForm.email||!uForm.password)return toast.warn('Complete todos los campos');
                const r=await S.createUser(uForm);
                if(r.ok){setUForm({name:'',username:'',email:'',password:'',role:Role.USUARIO});setUsers(await S.getUsers());toast.ok('Usuario creado')}
                else toast.err(r.err);
            }
        }finally{setSaving(false)}
    };

    const saveProfile=async()=>{
        setProfileSaving(true);
        const r=await DB.update('users',user.id,{name:profile.name,registro_msp:profile.registro_msp||null});
        setProfileSaving(false);
        if(r){toast.ok('Perfil actualizado');if(onUserUpdated)onUserUpdated(r)}
    };

    const saveClinic=async()=>{
        if(!clinic.nombre)return toast.warn('Indique el nombre de la clínica');
        setClinicSaving(true);
        const r=await S.saveClinicConfig(clinic);
        setClinicSaving(false);
        if(r)toast.ok('Configuración guardada');
    };
    const onLogoFile=async(e)=>{
        const f=e.target.files?.[0];if(!f)return;
        if(f.size>500*1024)return toast.warn('Logo demasiado grande (max 500KB)');
        const d=await compress(f,400);
        setClinic(c=>({...c,logo_data:d}));
    };

    const tabBtn=(id,label,color)=><button onClick={()=>setTab(id)} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${tab===id?`${color} text-white`:'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400'}`}>{label}</button>;

    return<div className="space-y-4 animate-fade-in">
        <div className="flex gap-2 overflow-x-auto pb-2">
            {isAdmin&&tabBtn('users','Usuarios','bg-brand-600')}
            {tabBtn('profile','Mi Perfil','bg-purple-600')}
            {isAdmin&&tabBtn('clinic','Clínica','bg-pink-600')}
            {isAdmin&&tabBtn('templates','Plantillas','bg-amber-600')}
            {tabBtn('backup','Backup','bg-emerald-600')}
            {tabBtn('info','Sistema','bg-indigo-600')}
        </div>

        {tab==='users'&&isAdmin&&<div className="space-y-4">
            <Card className="p-4">
                <SectionTitle>{editId?'Editar':'Nuevo'} Usuario</SectionTitle>
                <div className="space-y-2">
                    <Input placeholder="Nombre" value={uForm.name} onChange={e=>setUForm({...uForm,name:e.target.value})}/>
                    <Input placeholder="Usuario (minúsculas)" value={uForm.username} onChange={e=>setUForm({...uForm,username:e.target.value.toLowerCase()})} autoCapitalize="none"/>
                    {!editId&&<Input type="email" placeholder="Email" value={uForm.email} onChange={e=>setUForm({...uForm,email:e.target.value.toLowerCase()})} autoCapitalize="none"/>}
                    {!editId&&<Input type="password" placeholder="Contraseña (mín. 6)" value={uForm.password} onChange={e=>setUForm({...uForm,password:e.target.value})}/>}
                    <Select value={uForm.role} onChange={e=>setUForm({...uForm,role:e.target.value})}><option value={Role.USUARIO}>Usuario</option><option value={Role.ODONTOLOGO}>Odontólogo</option><option value={Role.ADMIN}>Administrador</option></Select>
                    <Btn onClick={saveUser} disabled={saving} className="w-full py-2.5 text-sm">{saving?'Guardando...':'Guardar'}</Btn>
                    {editId&&<Btn variant="secondary" onClick={()=>{setEditId(null);setUForm({name:'',username:'',email:'',password:'',role:Role.USUARIO})}} className="w-full py-2 text-sm">Cancelar</Btn>}
                    {!editId&&<p className="text-[10px] text-amber-600 dark:text-amber-400">⚠️ Desactivá "Confirm email" en Supabase</p>}
                </div>
            </Card>
            <Card className="overflow-hidden divide-y divide-slate-200 dark:divide-slate-700">{users.map(u=><div key={u.id} className="p-3 flex justify-between items-center"><div><p className="font-bold text-sm">{u.name}</p><p className="text-[10px] text-slate-400">@{u.username} • {u.email} • {u.role}{u.registro_msp?` • Reg: ${u.registro_msp}`:''}</p></div><div className="flex gap-1"><button onClick={()=>{setEditId(u.id);setUForm({name:u.name,username:u.username,email:u.email||'',password:'',role:u.role})}} className="p-2 text-brand-500"><Edit2 size={14}/></button><button onClick={async()=>{if(u.email===user.email)return toast.warn('No podés eliminarte');if(confirm('¿Eliminar? (Borrá también la cuenta en Auth manualmente)')){const ok=await S.delUser(u.id);if(ok){setUsers(await S.getUsers());toast.ok('Eliminado')}}}} className="p-2 text-red-400"><Trash2 size={14}/></button></div></div>)}</Card>
        </div>}

        {tab==='profile'&&<Card className="p-4 space-y-3">
            <SectionTitle icon={UserIcon} color="text-purple-600 dark:text-purple-400">Mi Perfil</SectionTitle>
            <div>
                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Nombre</label>
                <Input value={profile.name} onChange={e=>setProfile({...profile,name:e.target.value})}/>
            </div>
            <div>
                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">N° Registro MSP / CJPPU</label>
                <Input value={profile.registro_msp} onChange={e=>setProfile({...profile,registro_msp:e.target.value})} placeholder="Ej: 12345"/>
                <p className="text-[10px] text-slate-400 mt-1">Aparece automáticamente en los consentimientos generados</p>
            </div>
            <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded-lg text-[10px] text-slate-500 dark:text-slate-400">
                <p>Email: <span className="font-mono">{user.email}</span></p>
                <p>Usuario: <span className="font-mono">{user.username}</span></p>
                <p>Rol: <span className="font-mono">{user.role}</span></p>
            </div>
            <Btn onClick={saveProfile} disabled={profileSaving} className="w-full py-2.5 text-sm">{profileSaving?'Guardando...':'Guardar Perfil'}</Btn>
        </Card>}

        {tab==='templates'&&isAdmin&&<TemplatesPanel/>}

                    <div className="space-y-3">
                        {/* Logo */}
                        <div>
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Logo (opcional)</label>
                            <div className="flex items-center gap-3">
                                {clinic.logo_data?<img src={clinic.logo_data} className="w-16 h-16 object-contain border border-slate-200 dark:border-slate-700 rounded-lg bg-white p-1"/>:<div className="w-16 h-16 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-lg flex items-center justify-center text-[9px] text-slate-400 text-center px-1">Sin logo</div>}
                                <div className="flex flex-col gap-1">
                                    <input ref={logoRef} type="file" accept="image/*" onChange={onLogoFile} className="hidden"/>
                                    <Btn variant="secondary" onClick={()=>logoRef.current.click()} className="text-[10px] px-3 py-1.5">{clinic.logo_data?'Cambiar':'Subir'}</Btn>
                                    {clinic.logo_data&&<button onClick={()=>setClinic(c=>({...c,logo_data:null}))} className="text-[10px] text-red-500 hover:underline">Quitar</button>}

                                <Input value={clinic.nombre||''} onChange={e=>setClinic({...clinic,nombre:e.target.value})} placeholder="Arte Dental"/>

                            <div>
                                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Subtítulo</label>
                                <Input value={clinic.subtitulo||''} onChange={e=>setClinic({...clinic,subtitulo:e.target.value})} placeholder="Consultorio Odontológico"/>
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Dirección</label>
                            <Input value={clinic.direccion||''} onChange={e=>setClinic({...clinic,direccion:e.target.value})} placeholder="Av. Italia 1234"/>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Ciudad</label>
                                <Input value={clinic.ciudad||''} onChange={e=>setClinic({...clinic,ciudad:e.target.value})} placeholder="Montevideo"/>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">País</label>
                                <Input value={clinic.pais||''} onChange={e=>setClinic({...clinic,pais:e.target.value})} placeholder="Uruguay"/>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Teléfono</label>
                                <Input value={clinic.telefono||''} onChange={e=>setClinic({...clinic,telefono:e.target.value})} placeholder="+598 2XXX XXXX"/>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Email</label>
                                <Input type="email" value={clinic.email||''} onChange={e=>setClinic({...clinic,email:e.target.value})} placeholder="contacto@artedental.uy"/>
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">RUT (opcional)</label>
                            <Input value={clinic.rut||''} onChange={e=>setClinic({...clinic,rut:e.target.value})} placeholder="218XXXXXXXXX"/>
                        </div>

                        <div>
                            <label className="text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 block">Color principal</label>
                            <div className="flex items-center gap-2">
                                <input type="color" value={clinic.color_primario||'#4f46e5'} onChange={e=>setClinic({...clinic,color_primario:e.target.value})} className="w-12 h-10 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer"/>
                                <Input value={clinic.color_primario||'#4f46e5'} onChange={e=>setClinic({...clinic,color_primario:e.target.value})} placeholder="#4f46e5" className="flex-1"/>
                            </div>
                            <p className="text-[9px] text-slate-400 mt-1">Color del header en los documentos impresos</p>
                        </div>
                    </div>
                </Card>

                {/* Vista previa */}
                <Card className="p-4">
                    <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Vista previa del header</p>
                    <div className="bg-white border border-slate-200 dark:border-slate-700 rounded-lg p-4" style={{borderBottom:`3px solid ${clinic.color_primario||'#4f46e5'}`}}>
                        <div className="flex items-center gap-3">
                            {clinic.logo_data&&<img src={clinic.logo_data} className="w-12 h-12 object-contain"/>}
                            <div>
                                <p className="font-bold text-base" style={{color:clinic.color_primario||'#4f46e5'}}>{clinic.nombre||'Arte Dental'}</p>
                                <p className="text-[10px] text-slate-600">{clinic.subtitulo}{clinic.direccion?` — ${clinic.direccion}`:''}{clinic.ciudad?`, ${clinic.ciudad}`:''}</p>
                                {(clinic.telefono||clinic.email)&&<p className="text-[10px] text-slate-500">{clinic.telefono}{clinic.telefono&&clinic.email?' · ':''}{clinic.email}</p>}
                            </div>
                        </div>
                    </div>
                </Card>

                <Btn onClick={saveClinic} disabled={clinicSaving} className="w-full py-3 text-sm">{clinicSaving?'Guardando...':'Guardar configuración'}</Btn>
            </>}
        </div>}

        {tab==='backup'&&<div className="space-y-4">
            <Card className="p-6 text-center"><Download size={32} className="mx-auto text-brand-600 dark:text-brand-400 mb-2"/><h4 className="font-bold mb-2">Exportar</h4><p className="text-[10px] text-slate-400 mb-3">Pacientes, citas, historial, fichas, fotos</p><Btn onClick={async()=>{const d=await S.export();const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='ArteDental_'+new Date().toISOString().split('T')[0]+'.json';a.click()}} className="w-full py-3 text-sm">Descargar</Btn></Card>
            <Card className="p-6 text-center"><Upload size={32} className="mx-auto text-emerald-600 dark:text-emerald-400 mb-2"/><h4 className="font-bold mb-2">Importar</h4><input type="file" ref={fileRef} accept=".json" className="hidden" onChange={async e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{if(await S.import(ev.target.result)){toast.ok('Importado, recargando...');setTimeout(()=>window.location.reload(),1500)}};r.readAsText(f)}}/><Btn variant="success" onClick={()=>fileRef.current.click()} className="w-full py-3 text-sm">Cargar</Btn></Card>
        </div>}

        {tab==='info'&&<div className="bg-gradient-to-br from-slate-800 to-indigo-900 p-6 rounded-xl text-white text-center"><Cloud size={40} className="mx-auto mb-2"/><h4 className="text-lg font-bold mb-2">Sistema en la Nube</h4><p className="text-white/80 text-sm mb-3">Supabase Auth + Database</p><div className={`inline-flex items-center gap-2 px-4 py-2 rounded-full ${online?'bg-emerald-500':'bg-red-500'}`}>{online?<><Wifi size={16}/>Conectado</>:<><WifiOff size={16}/>Offline</>}</div><p className="text-white/60 text-[10px] mt-3">v3.9 • Configuración de clínica</p></div>}
    </div>
};

// ===== APP PRINCIPAL =====
const App=()=>{
    const[user,setUser]=useState(null);
    const[tab,setTab]=useState('dashboard');
    const[pid,setPid]=useState(null);
    const[loading,setLoading]=useState(true);
    const[online,setOnline]=useState(false);
    const[showPass,setShowPass]=useState(false);
    const[dark,toggleDark]=useTheme();

    useEffect(()=>{(async()=>{
        const ok=await S.init();setOnline(ok);
        if(ok){const u=await S.getCurrentUser();if(u)setUser(u)}
        setLoading(false);
    })()},[]);

    useEffect(()=>{const onFocus=async()=>setOnline(await DB.check());window.addEventListener('focus',onFocus);return()=>window.removeEventListener('focus',onFocus)},[]);

    useEffect(()=>{
        if(!user)return;
        let timer;
        const reset=()=>{clearTimeout(timer);timer=setTimeout(async()=>{toast.warn('Sesión cerrada por inactividad');await supabase.auth.signOut();setUser(null)},INACTIVITY_MS)};
        const events=['mousedown','keydown','touchstart','scroll'];
        events.forEach(e=>window.addEventListener(e,reset));reset();
        return()=>{clearTimeout(timer);events.forEach(e=>window.removeEventListener(e,reset))};
    },[user]);

    const logout=async()=>{await supabase.auth.signOut();setUser(null);setPid(null);toast.ok('Sesión cerrada')};

    const openPatient=(id)=>{setPid(id);setTab('pacientes')};
    const goTab=(t)=>{setTab(t);setPid(null)};

    if(loading)return<><Toasts/><div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-800 to-indigo-900 text-white safe-top safe-bottom"><RefreshCw className="animate-spin mb-3" size={40}/><p className="font-bold">Conectando...</p></div></>;
    if(!user)return<><Toasts/><Login onLogin={setUser} online={online}/></>;

    const tabs=[
        {id:'dashboard',label:'Inicio',icon:LayoutDashboard},
        {id:'agenda',label:'Agenda',icon:Calendar},
        {id:'pacientes',label:'Pacientes (Ficha e Historial)',icon:Users},
        {id:'admin',label:'Sistema',icon:Shield}
    ];

    return<div className="min-h-screen flex flex-col">
        <Toasts/>
        {showPass&&<Portal><div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4"><Card className="w-full max-w-xs p-5"><h3 className="font-bold text-brand-600 dark:text-brand-400 mb-3">Cambiar mi Contraseña</h3><Input id="np" type="password" placeholder="Nueva (mín. 6)" className="mb-3"/><div className="flex gap-2"><Btn onClick={async()=>{const np=document.getElementById('np').value;const r=await S.changeOwnPassword(np);if(r.ok){setShowPass(false);toast.ok('Contraseña cambiada')}else toast.warn(r.err)}} className="flex-1 py-2 text-sm">Guardar</Btn><Btn variant="secondary" onClick={()=>setShowPass(false)} className="flex-1 py-2 text-sm">Cancelar</Btn></div></Card></div></Portal>}

        <header className="bg-slate-800 dark:bg-slate-950 text-white p-3 safe-top no-print border-b border-slate-700">
            <div className="flex justify-between items-center">
                <div className="flex items-center gap-2"><span className="text-xl">🦷</span><span className="font-bold">Arte Dental</span></div>
                <div className="flex items-center gap-2">
                    <Status on={online}/>
                    <button onClick={toggleDark} className="p-2 bg-slate-700 dark:bg-slate-800 rounded-lg hover:bg-slate-600" title={dark?'Tema claro':'Tema oscuro'}>{dark?<Sun size={16}/>:<Moon size={16}/>}</button>
                    <button onClick={()=>setShowPass(true)} className="p-2 bg-slate-700 dark:bg-slate-800 rounded-lg hover:bg-slate-600" title="Cambiar contraseña"><Key size={16}/></button>
                    <button onClick={logout} className="p-2 bg-slate-700 dark:bg-slate-800 rounded-lg hover:bg-slate-600" title="Cerrar sesión"><LogOut size={16}/></button>
                </div>
            </div>
        </header>

        <nav className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-2 py-1 flex gap-1 overflow-x-auto scrollbar-hide no-print">
            {tabs.map(t=><button key={t.id} onClick={()=>goTab(t.id)} className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${tab===t.id?'bg-brand-100 dark:bg-brand-900/40 text-brand-600 dark:text-brand-300':'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50'}`}><t.icon size={14}/>{t.label}</button>)}
        </nav>

        <main className="flex-1 p-3 overflow-auto safe-bottom">
            {tab==='dashboard'&&<Dashboard user={user} onOpenPatient={openPatient}/>}
            {tab==='agenda'&&<Agenda user={user} onOpenPatient={openPatient}/>}
            {tab==='pacientes'&&!pid&&<PatientsList user={user} onOpen={setPid}/>}
            {tab==='pacientes'&&pid&&<PatientHub user={user} patientId={pid} onBack={()=>setPid(null)}/>}
            {tab==='admin'&&<Admin user={user} online={online} onUserUpdated={u=>setUser({...user,...u})}/>}
        </main>

        <footer className="p-2 text-center text-[10px] text-slate-400 no-print safe-bottom">Arte Dental © 2025 • v3.9 • {online?'🟢':'🔴'}</footer>
    </div>
};

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
