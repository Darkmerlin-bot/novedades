<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Novedades - Policía Científica</title>
    <link rel="icon" href="https://raw.githubusercontent.com/Darkmerlin-bot/novedades/main/Logo%20para%20programa.png" type="image/png">
    <!-- Preconexiones para acelerar la carga de CDNs -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://whfrenunfcrcrljithex.supabase.co">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Precargar fuente Inter para que esté lista cuando app.js arranque -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media print {
            body { background: white !important; }
            .no-print, header, .print\:hidden { display: none !important; }
            #root > div { background: white !important; }
            #root > div > div:first-child { display: none !important; }
            main { display: none !important; }
            .fixed { position: relative !important; background: white !important; }
            .fixed > div { max-height: none !important; overflow: visible !important; border-radius: 0 !important; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; }
            thead { display: table-header-group; }
        }
    </style>
</head>
<body>
    <div id="loading-screen" style="position:fixed;inset:0;background:linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="text-align:center;color:white;">
            <img src="https://raw.githubusercontent.com/Darkmerlin-bot/novedades/main/Logo%20para%20programa.png" alt="Escudo" style="width:80px;height:80px;margin:0 auto 1.5rem;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));">
            <div style="font-weight:800;font-size:1.1rem;letter-spacing:0.05em;">Policía Científica</div>
            <div style="font-size:0.7rem;color:#94a3b8;margin-top:0.5rem;text-transform:uppercase;letter-spacing:0.15em;">Sistema de Gestión</div>
            <div style="margin-top:1.5rem;">
                <div style="width:32px;height:32px;border:3px solid #10b981;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div>
            </div>
        </div>
    </div>
    <div id="root"></div>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
